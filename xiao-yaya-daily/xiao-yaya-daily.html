<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小丫丫的日常</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f4f7f1;
        --ink: #243034;
        --muted: #65727a;
        --line: #d9e0d2;
        --panel: #fffdf6;
        --green: #4f9c6d;
        --green-dark: #2f6f52;
        --blue: #69a9cf;
        --rose: #e97385;
        --yellow: #f2c85b;
        --violet: #8c77be;
        --wood: #b98050;
        --floor: #ecd7b6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.85), transparent 300px),
          var(--page);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: var(--green-dark);
        color: #fff;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      button:focus-visible,
      .choice:focus-visible {
        outline: 3px solid rgba(105, 169, 207, 0.72);
        outline-offset: 2px;
      }

      .app {
        width: min(100%, 1180px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 14px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(25px, 4vw, 38px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .day-pill {
        min-width: 162px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        text-align: center;
        font-weight: 900;
      }

      .layout {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 318px;
        gap: 12px;
      }

      .world,
      .side {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 16px 38px rgba(54, 70, 53, 0.12);
        overflow: hidden;
      }

      .scene {
        min-height: 540px;
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, #9fd2ee 0 42%, #91c67b 42% 100%);
      }

      .scene.home {
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px) 0 0 / 78px 100%,
          linear-gradient(180deg, #ffe9be 0 36%, var(--floor) 36% 100%);
      }

      .scene.market {
        background: linear-gradient(180deg, #a9dff0 0 38%, #e7d5a3 38% 100%);
      }

      .scene.neighbor {
        background: linear-gradient(180deg, #afdff3 0 40%, #b8d386 40% 100%);
      }

      .room-tabs,
      .place-tabs {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 253, 246, 0.95);
      }

      .place-tabs {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .tab {
        min-width: 0;
        padding: 0 8px;
        background: #edf3e7;
        color: var(--ink);
        white-space: nowrap;
      }

      .tab.active {
        background: var(--green-dark);
        color: #fff;
      }

      .character {
        position: absolute;
        left: 50%;
        bottom: 110px;
        width: 104px;
        height: 170px;
        transform: translateX(-50%);
        transition: left 0.35s ease, bottom 0.35s ease;
        z-index: 4;
      }

      .head {
        position: absolute;
        left: 24px;
        top: 0;
        width: 56px;
        height: 56px;
        border: 3px solid #2e3638;
        border-radius: 50%;
        background: #ffd9b1;
      }

      .hair {
        position: absolute;
        left: 18px;
        top: -6px;
        width: 68px;
        height: 34px;
        border-radius: 50% 50% 18px 18px;
        background: #372b27;
      }

      .pigtail {
        position: absolute;
        top: 20px;
        width: 23px;
        height: 23px;
        border-radius: 50%;
        background: #372b27;
      }

      .pigtail.left {
        left: 5px;
      }

      .pigtail.right {
        right: 5px;
      }

      .eye {
        position: absolute;
        top: 29px;
        width: 6px;
        height: 8px;
        border-radius: 50%;
        background: #2e3638;
      }

      .eye.left {
        left: 41px;
      }

      .eye.right {
        right: 41px;
      }

      .smile {
        position: absolute;
        left: 45px;
        top: 40px;
        width: 14px;
        height: 7px;
        border-bottom: 3px solid #b95b62;
        border-radius: 0 0 14px 14px;
      }

      .dress {
        position: absolute;
        left: 21px;
        top: 58px;
        width: 62px;
        height: 78px;
        clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%);
        background: var(--rose);
        border: 3px solid #2e3638;
      }

      .arm,
      .leg {
        position: absolute;
        background: #ffd9b1;
        border: 3px solid #2e3638;
      }

      .arm {
        top: 70px;
        width: 19px;
        height: 54px;
        border-radius: 12px;
      }

      .arm.left {
        left: 10px;
        transform: rotate(18deg);
      }

      .arm.right {
        right: 10px;
        transform: rotate(-18deg);
      }

      .leg {
        top: 130px;
        width: 18px;
        height: 40px;
        border-radius: 12px;
      }

      .leg.left {
        left: 34px;
      }

      .leg.right {
        right: 34px;
      }

      .building {
        position: absolute;
        border: 3px solid #334042;
        border-radius: 8px 8px 5px 5px;
        background: #ffe3a3;
      }

      .building::before {
        content: "";
        position: absolute;
        left: -16px;
        right: -16px;
        top: -38px;
        height: 44px;
        background: #d96355;
        clip-path: polygon(50% 0, 100% 100%, 0 100%);
        border-radius: 6px;
      }

      .home-house {
        left: 60px;
        bottom: 76px;
        width: 170px;
        height: 120px;
      }

      .neighbor-house {
        right: 56px;
        bottom: 76px;
        width: 176px;
        height: 124px;
        background: #ffd6be;
      }

      .market-stall {
        position: absolute;
        left: 70px;
        bottom: 80px;
        width: 230px;
        height: 138px;
        border: 3px solid #334042;
        border-radius: 8px;
        background: #fff4cc;
      }

      .market-stall::before {
        content: "";
        position: absolute;
        left: -3px;
        right: -3px;
        top: -46px;
        height: 48px;
        border: 3px solid #334042;
        border-radius: 8px 8px 0 0;
        background: repeating-linear-gradient(90deg, #e85d66 0 34px, #fff1c2 34px 68px);
      }

      .market-crates {
        position: absolute;
        right: 58px;
        bottom: 84px;
        display: grid;
        grid-template-columns: repeat(2, 108px);
        gap: 12px;
      }

      .crate,
      .furniture,
      .friend-card {
        border: 3px solid #334042;
        border-radius: 8px;
        background: #fffdf6;
      }

      .crate {
        min-height: 82px;
        padding: 10px;
        font-size: 32px;
        text-align: center;
      }

      .label {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
      }

      .room {
        position: absolute;
        inset: 72px 22px 20px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: 1fr 1fr;
        gap: 14px;
        z-index: 2;
      }

      .furniture {
        position: relative;
        min-height: 132px;
        padding: 14px;
        background: rgba(255, 253, 246, 0.92);
      }

      .furniture strong {
        display: block;
        font-size: 18px;
      }

      .furniture span {
        position: absolute;
        right: 14px;
        bottom: 12px;
        font-size: 42px;
      }

      .room .wide {
        grid-column: span 2;
      }

      .friend-card {
        position: absolute;
        right: 34px;
        bottom: 92px;
        width: 246px;
        min-height: 170px;
        padding: 18px;
        background: #fff6df;
      }

      .friend-card .face {
        font-size: 58px;
      }

      .path {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 112px;
        background:
          radial-gradient(circle at 20% 45%, rgba(255, 255, 255, 0.42) 0 9px, transparent 10px),
          radial-gradient(circle at 48% 60%, rgba(255, 255, 255, 0.36) 0 8px, transparent 9px),
          radial-gradient(circle at 75% 42%, rgba(255, 255, 255, 0.4) 0 10px, transparent 11px),
          #d8bd82;
      }

      .scene.home .path {
        display: none;
      }

      .side {
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
      }

      .panel {
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 18px;
        line-height: 1.2;
      }

      .meters {
        display: grid;
        gap: 9px;
      }

      .meter {
        display: grid;
        grid-template-columns: 58px 1fr 34px;
        gap: 8px;
        align-items: center;
        font-size: 13px;
        font-weight: 900;
      }

      .bar {
        height: 12px;
        border-radius: 999px;
        background: #e7eadf;
        overflow: hidden;
      }

      .fill {
        height: 100%;
        border-radius: inherit;
        background: var(--green);
        transition: width 0.25s ease;
      }

      .choices,
      .outfits {
        display: grid;
        gap: 8px;
      }

      .choice {
        width: 100%;
        min-height: 46px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f5f8ef;
        color: var(--ink);
        text-align: left;
      }

      .choice strong {
        display: block;
        font-size: 15px;
      }

      .choice span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .outfits {
        grid-template-columns: repeat(3, 1fr);
      }

      .outfit {
        min-height: 54px;
        padding: 0;
        border: 3px solid transparent;
        background: #f5f8ef;
        color: var(--ink);
      }

      .outfit.active {
        border-color: #2f6f52;
      }

      .swatch {
        display: block;
        width: 30px;
        height: 30px;
        margin: 5px auto 2px;
        border: 2px solid #334042;
        border-radius: 50% 50% 8px 8px;
      }

      .story {
        min-height: 156px;
        overflow: auto;
      }

      .story p {
        margin: 0 0 9px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
        font-weight: 750;
      }

      .menu-card {
        margin-top: 10px;
        padding: 10px;
        border-radius: 8px;
        background: #eef6eb;
        font-size: 14px;
        font-weight: 850;
        line-height: 1.45;
      }

      .footer-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 14px;
      }

      .secondary {
        background: #58636a;
      }

      @media (max-width: 860px) {
        .app {
          padding: 10px;
        }

        .topbar,
        .layout {
          grid-template-columns: 1fr;
        }

        .day-pill {
          width: 100%;
        }

        .scene {
          min-height: 500px;
        }

        .room-tabs,
        .place-tabs {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .room {
          inset: 116px 12px 16px;
          grid-template-columns: 1fr 1fr;
          gap: 9px;
        }

        .furniture {
          min-height: 108px;
          padding: 10px;
        }

        .market-stall,
        .home-house {
          left: 18px;
          transform: scale(0.86);
          transform-origin: left bottom;
        }

        .neighbor-house,
        .friend-card {
          right: 16px;
          transform: scale(0.88);
          transform-origin: right bottom;
        }

        .market-crates {
          right: 14px;
          bottom: 62px;
          grid-template-columns: repeat(2, 82px);
        }

        .crate {
          min-height: 72px;
          font-size: 25px;
        }

        .character {
          bottom: 78px;
          width: 92px;
          transform: translateX(-50%) scale(0.88);
        }
      }

      @media (max-width: 520px) {
        .scene {
          min-height: 470px;
        }

        .room {
          grid-template-columns: 1fr;
          overflow: auto;
        }

        .room .wide {
          grid-column: span 1;
        }

        .character {
          left: 76%;
          bottom: 24px;
          transform: translateX(-50%) scale(0.68);
        }

        .scene.home .character {
          z-index: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>小丫丫的日常</h1>
        <div class="day-pill" id="dayPill">早上 7:30 · 晴天</div>
      </header>

      <section class="layout" aria-label="游戏区">
        <div class="world">
          <nav class="place-tabs" aria-label="地点">
            <button class="tab active" data-place="home">小熊猫家</button>
            <button class="tab" data-place="market">菜市场</button>
            <button class="tab" data-place="neighbor">小浣熊家</button>
          </nav>
          <div class="room-tabs" id="roomTabs" aria-label="房间">
            <button class="tab active" data-room="bedroom">卧室</button>
            <button class="tab" data-room="bathroom">厕所</button>
            <button class="tab" data-room="living">客厅</button>
            <button class="tab" data-room="kitchen">厨房餐厅</button>
          </div>
          <section class="scene home" id="scene" aria-live="polite">
            <div id="sceneArt"></div>
            <div class="character" id="yaya" aria-label="小丫丫">
              <div class="pigtail left"></div>
              <div class="pigtail right"></div>
              <div class="hair"></div>
              <div class="head"></div>
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="smile"></div>
              <div class="arm left"></div>
              <div class="arm right"></div>
              <div class="dress" id="dress"></div>
              <div class="leg left"></div>
              <div class="leg right"></div>
            </div>
            <div class="path"></div>
          </section>
        </div>

        <aside class="side" aria-label="日常面板">
          <section class="panel">
            <h2>今天的心情</h2>
            <div class="meters" id="meters"></div>
          </section>

          <section class="panel">
            <h2>早上穿什么</h2>
            <div class="outfits" id="outfits"></div>
          </section>

          <section class="panel story" id="storyPanel">
            <h2>小丫丫在做什么</h2>
            <div id="storyLog"></div>
            <div class="menu-card" id="menuCard">今天还没有去菜市场，晚饭等小丫丫买菜后自动安排。</div>
          </section>

          <div class="footer-actions">
            <button id="mainAction">做一件日常小事</button>
            <button class="secondary" id="newDay">新的一天</button>
          </div>
        </aside>
      </section>
    </main>

    <script>
      const state = {
        place: "home",
        room: "bedroom",
        timeIndex: 0,
        outfit: "rose",
        energy: 72,
        happiness: 78,
        hunger: 42,
        clean: 70,
        coins: 28,
        menu: null,
      };

      const times = ["早上 7:30", "上午 10:00", "中午 12:20", "下午 3:40", "傍晚 6:10", "晚上 8:30"];

      const outfits = [
        { id: "rose", name: "草莓裙", color: "#e97385" },
        { id: "sun", name: "向日葵", color: "#f2c85b" },
        { id: "sky", name: "蓝云朵", color: "#69a9cf" },
        { id: "leaf", name: "薄荷套", color: "#63b97a" },
        { id: "grape", name: "葡萄衫", color: "#8c77be" },
        { id: "carrot", name: "胡萝卜", color: "#ec8b4b" },
      ];

      const marketPlans = [
        {
          cost: 12,
          items: ["番茄", "鸡蛋", "青菜"],
          meal: "番茄鸡蛋面配清炒青菜",
          reason: "快快煮好，适合想去客厅玩一会儿的日子。",
        },
        {
          cost: 16,
          items: ["土豆", "胡萝卜", "牛肉粒"],
          meal: "土豆胡萝卜炖饭",
          reason: "香香软软，吃完能量会涨得很快。",
        },
        {
          cost: 10,
          items: ["豆腐", "蘑菇", "小白菜"],
          meal: "蘑菇豆腐汤和米饭",
          reason: "清清爽爽，适合晴天晚饭。",
        },
        {
          cost: 14,
          items: ["玉米", "鸡腿", "生菜"],
          meal: "玉米鸡腿饭团和生菜汤",
          reason: "可以带去小浣熊家一起分享。",
        },
      ];

      const roomActions = {
        bedroom: {
          title: "整理卧室",
          note: "小丫丫把枕头拍蓬，又选了一件很好看的衣服。",
          energy: 8,
          happiness: 4,
          clean: 2,
          hunger: 4,
        },
        bathroom: {
          title: "洗脸刷牙",
          note: "水龙头哗啦啦，小丫丫变得清清爽爽。",
          energy: 1,
          happiness: 3,
          clean: 15,
          hunger: 3,
        },
        living: {
          title: "看绘本",
          note: "客厅地毯软软的，小丫丫读到一个好笑的故事。",
          energy: -4,
          happiness: 10,
          clean: -1,
          hunger: 5,
        },
        kitchen: {
          title: "做饭吃饭",
          note: "厨房餐厅香喷喷，小丫丫把今天的饭吃得干干净净。",
          energy: 8,
          happiness: 8,
          clean: -4,
          hunger: -28,
        },
      };

      const metersEl = document.querySelector("#meters");
      const storyLog = document.querySelector("#storyLog");
      const menuCard = document.querySelector("#menuCard");
      const scene = document.querySelector("#scene");
      const sceneArt = document.querySelector("#sceneArt");
      const dress = document.querySelector("#dress");
      const dayPill = document.querySelector("#dayPill");
      const roomTabs = document.querySelector("#roomTabs");

      function clamp(value) {
        return Math.max(0, Math.min(100, value));
      }

      function addStory(text) {
        const p = document.createElement("p");
        p.textContent = text;
        storyLog.prepend(p);
        while (storyLog.children.length > 6) {
          storyLog.lastChild.remove();
        }
      }

      function updateMeters() {
        const items = [
          ["精神", state.energy],
          ["开心", state.happiness],
          ["肚子", 100 - state.hunger],
          ["干净", state.clean],
        ];
        metersEl.innerHTML = items
          .map(
            ([name, value]) => `
              <div class="meter">
                <span>${name}</span>
                <div class="bar"><div class="fill" style="width:${value}%"></div></div>
                <b>${value}</b>
              </div>
            `,
          )
          .join("");
      }

      function updateOutfits() {
        document.querySelector("#outfits").innerHTML = outfits
          .map(
            (item) => `
              <button class="outfit ${state.outfit === item.id ? "active" : ""}" data-outfit="${item.id}" title="${item.name}">
                <span class="swatch" style="background:${item.color}"></span>
                ${item.name}
              </button>
            `,
          )
          .join("");
        dress.style.background = outfits.find((item) => item.id === state.outfit).color;
      }

      function updateTabs() {
        document.querySelectorAll("[data-place]").forEach((button) => {
          button.classList.toggle("active", button.dataset.place === state.place);
        });
        document.querySelectorAll("[data-room]").forEach((button) => {
          button.classList.toggle("active", button.dataset.room === state.room);
        });
        roomTabs.hidden = state.place !== "home";
      }

      function homeArt() {
        const rooms = {
          bedroom: [
            ["小床", "被子晒着太阳", "🛏️", "wide"],
            ["衣柜", "漂亮衣服排排站", "👗", ""],
            ["书桌", "画笔和贴纸", "🖍️", ""],
            ["窗台", "小花在点头", "🌼", ""],
          ],
          bathroom: [
            ["洗手台", "刷牙杯摆好了", "🪥", ""],
            ["马桶", "干净小厕所", "🚽", ""],
            ["浴缸", "泡泡像云一样", "🛁", "wide"],
            ["毛巾架", "软软小毛巾", "🧺", ""],
          ],
          living: [
            ["沙发", "可以抱着靠垫", "🛋️", "wide"],
            ["电视柜", "动画片时间", "📺", ""],
            ["地毯", "坐着读绘本", "📚", ""],
            ["玩具箱", "积木还没收", "🧸", ""],
          ],
          kitchen: [
            ["灶台", "准备咕嘟咕嘟", "🍳", ""],
            ["冰箱", "贴着小便签", "🧊", ""],
            ["餐桌", "等今天的晚饭", "🍚", "wide"],
            ["水槽", "洗菜洗碗", "🥬", ""],
          ],
        };
        return `<div class="room">${rooms[state.room]
          .map(
            ([name, text, icon, wide]) => `
              <div class="furniture ${wide}">
                <strong>${name}</strong>
                <p>${text}</p>
                <span>${icon}</span>
              </div>
            `,
          )
          .join("")}</div>`;
      }

      function renderScene() {
        scene.className = `scene ${state.place}`;
        if (state.place === "home") {
          sceneArt.innerHTML = homeArt();
          document.querySelector("#mainAction").textContent = roomActions[state.room].title;
        }
        if (state.place === "market") {
          sceneArt.innerHTML = `
            <div class="market-stall"></div>
            <div class="market-crates">
              <div class="crate">🥬<span class="label">青菜摊</span></div>
              <div class="crate">🥕<span class="label">根茎篮</span></div>
              <div class="crate">🍅<span class="label">番茄盒</span></div>
              <div class="crate">🥚<span class="label">鸡蛋筐</span></div>
            </div>
          `;
          document.querySelector("#mainAction").textContent = "买菜并自动安排晚饭";
        }
        if (state.place === "neighbor") {
          sceneArt.innerHTML = `
            <div class="building home-house"></div>
            <div class="building neighbor-house"></div>
            <div class="friend-card">
              <div class="face">🦝</div>
              <strong>小浣熊家</strong>
              <p>小浣熊已经把小点心摆到窗边，等小丫丫来聊天。</p>
            </div>
          `;
          document.querySelector("#mainAction").textContent = "去小浣熊家玩";
        }
        updateTabs();
      }

      function updateMenuCard() {
        if (!state.menu) {
          menuCard.textContent = "今天还没有去菜市场，晚饭等小丫丫买菜后自动安排。";
          return;
        }
        menuCard.innerHTML = `
          <strong>今天煮：${state.menu.meal}</strong><br>
          买了：${state.menu.items.join("、")}。<br>
          ${state.menu.reason}
        `;
      }

      function passTime() {
        state.timeIndex = Math.min(times.length - 1, state.timeIndex + 1);
        dayPill.textContent = `${times[state.timeIndex]} · 晴天`;
      }

      function applyAction(change) {
        state.energy = clamp(state.energy + change.energy);
        state.happiness = clamp(state.happiness + change.happiness);
        state.hunger = clamp(state.hunger + change.hunger);
        state.clean = clamp(state.clean + change.clean);
        passTime();
        updateMeters();
      }

      function doMainAction() {
        if (state.place === "home") {
          const action = roomActions[state.room];
          applyAction(action);
          addStory(action.note);
        }
        if (state.place === "market") {
          const affordable = marketPlans.filter((plan) => plan.cost <= state.coins);
          const plan = affordable[(state.timeIndex + state.happiness + state.energy) % affordable.length];
          state.menu = plan;
          state.coins -= plan.cost;
          applyAction({ energy: -6, happiness: 8, hunger: 8, clean: -3 });
          updateMenuCard();
          addStory(`小丫丫带着 ${plan.items.join("、")} 回家了，今天自动决定煮 ${plan.meal}。`);
        }
        if (state.place === "neighbor") {
          applyAction({ energy: -8, happiness: 14, hunger: 7, clean: -2 });
          addStory("小丫丫到小浣熊家玩拼图，还把今天的故事讲给小浣熊听。");
        }
      }

      function newDay() {
        state.place = "home";
        state.room = "bedroom";
        state.timeIndex = 0;
        state.energy = 74;
        state.happiness = 76;
        state.hunger = 38;
        state.clean = 72;
        state.coins = 28;
        state.menu = null;
        dayPill.textContent = `${times[state.timeIndex]} · 晴天`;
        storyLog.innerHTML = "";
        addStory("新的一天开始了，小丫丫伸伸懒腰，准备过自己的日常。");
        updateAll();
      }

      function updateAll() {
        updateMeters();
        updateOutfits();
        updateMenuCard();
        renderScene();
      }

      document.querySelectorAll("[data-place]").forEach((button) => {
        button.addEventListener("click", () => {
          state.place = button.dataset.place;
          renderScene();
          addStory(`小丫丫来到了${button.textContent}。`);
        });
      });

      document.querySelectorAll("[data-room]").forEach((button) => {
        button.addEventListener("click", () => {
          state.room = button.dataset.room;
          renderScene();
          addStory(`小丫丫走进了${button.textContent}。`);
        });
      });

      document.querySelector("#outfits").addEventListener("click", (event) => {
        const button = event.target.closest("[data-outfit]");
        if (!button) return;
        const item = outfits.find((outfit) => outfit.id === button.dataset.outfit);
        state.outfit = item.id;
        state.happiness = clamp(state.happiness + 3);
        updateOutfits();
        updateMeters();
        addStory(`小丫丫换上了${item.name}，觉得今天更好看了。`);
      });

      document.querySelector("#mainAction").addEventListener("click", doMainAction);
      document.querySelector("#newDay").addEventListener("click", newDay);

      addStory("小丫丫醒来了，衣柜里有好多漂亮衣服，今天想先穿哪一件呢？");
      updateAll();
    </script>
  </body>
</html>
