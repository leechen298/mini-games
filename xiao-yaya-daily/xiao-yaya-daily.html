<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小丫丫的日常</title>
    <style>
      :root {
        color-scheme: light;
        --page: #eef5ed;
        --panel: #fffdf6;
        --ink: #253238;
        --muted: #66747a;
        --line: #d7dfcf;
        --green: #3f7b5d;
        --blue: #6aaad0;
        --rose: #e7778b;
        --yellow: #f1c65a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.8), transparent 260px),
          var(--page);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: var(--green);
        color: #fff;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .app {
        width: min(100%, 1180px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 14px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(25px, 4vw, 38px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .day-pill {
        min-width: 180px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        text-align: center;
        font-weight: 900;
      }

      .layout {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 12px;
      }

      .stage-wrap,
      .side {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 16px 38px rgba(54, 70, 53, 0.12);
        overflow: hidden;
      }

      canvas {
        width: 100%;
        height: min(68vh, 660px);
        min-height: 500px;
        display: block;
        background: #9ed4ef;
        outline: none;
        touch-action: none;
      }

      .side {
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
      }

      .panel {
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 18px;
        line-height: 1.2;
      }

      .meters {
        display: grid;
        gap: 9px;
      }

      .meter {
        display: grid;
        grid-template-columns: 58px 1fr 34px;
        gap: 8px;
        align-items: center;
        font-size: 13px;
        font-weight: 900;
      }

      .bar {
        height: 12px;
        border-radius: 999px;
        background: #e7eadf;
        overflow: hidden;
      }

      .fill {
        height: 100%;
        border-radius: inherit;
        background: var(--green);
      }

      .outfits {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .outfit {
        min-height: 54px;
        padding: 0;
        border: 3px solid transparent;
        background: #f4f7ef;
        color: var(--ink);
      }

      .outfit.active {
        border-color: var(--green);
      }

      .swatch {
        display: block;
        width: 30px;
        height: 30px;
        margin: 5px auto 2px;
        border: 2px solid #334042;
        border-radius: 50% 50% 8px 8px;
      }

      .shoe-swatch {
        border-radius: 14px 14px 8px 8px;
        width: 34px;
        height: 18px;
        margin-top: 12px;
      }

      .story {
        min-height: 168px;
        overflow: auto;
      }

      .story p {
        margin: 0 0 9px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
        font-weight: 750;
      }

      .menu-card {
        margin-top: 10px;
        padding: 10px;
        border-radius: 8px;
        background: #eef6eb;
        font-size: 14px;
        font-weight: 850;
        line-height: 1.45;
      }

      .help {
        padding: 12px 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        font-weight: 850;
      }

      .touch-pad {
        display: none;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid var(--line);
        background: rgba(255, 253, 246, 0.95);
      }

      .touch-pad button {
        min-height: 48px;
        background: #58636a;
      }

      @media (max-width: 860px) {
        .app {
          padding: 10px;
        }

        .topbar,
        .layout {
          grid-template-columns: 1fr;
        }

        canvas {
          min-height: 460px;
          height: 58vh;
        }

        .touch-pad {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>小丫丫的日常</h1>
        <div class="day-pill" id="dayPill">早上 7:30 · 家门口</div>
      </header>

      <section class="layout" aria-label="游戏区">
        <div class="stage-wrap">
          <canvas id="game" width="960" height="600" tabindex="0" aria-label="用方向键控制小鸭子"></canvas>
          <div class="touch-pad" aria-label="手机控制">
            <button data-touch="left">← 走</button>
            <button data-touch="up">↑ 跳/进门</button>
            <button data-touch="right">走 →</button>
          </div>
        </div>

        <aside class="side" aria-label="日常面板">
          <section class="panel">
            <h2>今天的心情</h2>
            <div class="meters" id="meters"></div>
          </section>

          <section class="panel">
            <h2>早上穿什么</h2>
            <div class="outfits" id="outfits"></div>
            <h2 style="margin-top: 14px">鞋子</h2>
            <div class="outfits" id="shoes"></div>
          </section>

          <section class="panel story">
            <h2>小鸭子在做什么</h2>
            <div id="storyLog"></div>
            <div class="menu-card" id="menuCard">去菜市场摊主旁边按 ↑，会自动买菜并安排今天煮什么饭。</div>
          </section>

          <div class="help">
            键盘：← → 控制方向，↑ 跳。站到门口、摊主、朋友旁边按 ↑ 可以进门、出门、买菜或聊天。
          </div>
        </aside>
      </section>
    </main>

    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const dayPill = document.querySelector("#dayPill");
      const metersEl = document.querySelector("#meters");
      const outfitsEl = document.querySelector("#outfits");
      const shoesEl = document.querySelector("#shoes");
      const storyLog = document.querySelector("#storyLog");
      const menuCard = document.querySelector("#menuCard");

      const groundY = 484;
      const keys = { left: false, right: false };
      const rooms = ["bedroom", "bathroom", "living", "kitchen"];
      const roomNames = {
        bedroom: "卧室",
        bathroom: "厕所",
        living: "客厅",
        kitchen: "厨房餐厅",
      };

      const outfits = [
        { id: "rose", name: "草莓裙", color: "#e7778b" },
        { id: "sun", name: "向日葵", color: "#f1c65a" },
        { id: "sky", name: "蓝云朵", color: "#6aaad0" },
        { id: "leaf", name: "薄荷套", color: "#65b981" },
        { id: "grape", name: "葡萄衫", color: "#8a77be" },
        { id: "carrot", name: "胡萝卜", color: "#eb8d4e" },
        { id: "star", name: "星星裙", color: "#f7a8c6" },
        { id: "sailor", name: "水手服", color: "#4c8fb6" },
        { id: "lime", name: "青柠裙", color: "#a6d96a" },
        { id: "cake", name: "蛋糕裙", color: "#f0a66c" },
        { id: "night", name: "月亮裙", color: "#5963a8" },
        { id: "snow", name: "雪花裙", color: "#96d8df" },
      ];

      const shoes = [
        { id: "red", name: "红皮鞋", color: "#c94e5b" },
        { id: "blue", name: "蓝球鞋", color: "#4f89c8" },
        { id: "yellow", name: "黄雨靴", color: "#e5bd38" },
        { id: "purple", name: "紫凉鞋", color: "#8064b4" },
        { id: "green", name: "绿布鞋", color: "#4f9a6a" },
        { id: "black", name: "黑小鞋", color: "#3d4248" },
      ];

      const meals = [
        { items: ["番茄", "鸡蛋", "青菜"], meal: "番茄鸡蛋面配清炒青菜", cost: 12 },
        { items: ["土豆", "胡萝卜", "牛肉粒"], meal: "土豆胡萝卜炖饭", cost: 16 },
        { items: ["豆腐", "蘑菇", "小白菜"], meal: "蘑菇豆腐汤和米饭", cost: 10 },
        { items: ["玉米", "鸡腿", "生菜"], meal: "玉米鸡腿饭团和生菜汤", cost: 14 },
      ];

      const state = {
        scene: "street",
        room: "bedroom",
        time: 0,
        outfit: "rose",
        shoes: "red",
        energy: 74,
        happiness: 78,
        hunger: 40,
        clean: 72,
        coins: 30,
        menu: null,
        prompt: "你控制小鸭子：用 ← → 走到门口，按 ↑ 可以进门。",
      };

      const player = {
        x: 130,
        y: groundY,
        vy: 0,
        width: 54,
        height: 116,
        facing: 1,
        onGround: true,
      };

      const times = ["早上 7:30", "上午 10:00", "中午 12:20", "下午 3:40", "傍晚 6:10", "晚上 8:30"];

      function clamp(value) {
        return Math.max(0, Math.min(100, value));
      }

      function addStory(text) {
        const p = document.createElement("p");
        p.textContent = text;
        storyLog.prepend(p);
        while (storyLog.children.length > 6) storyLog.lastChild.remove();
      }

      function passTime() {
        state.time = Math.min(times.length - 1, state.time + 1);
        updateDay();
      }

      function updateDay() {
        const place =
          state.scene === "street"
            ? "家门口"
            : state.scene === "market"
              ? "菜市场"
              : state.scene === "neighbor"
                ? "小浣熊家"
                : roomNames[state.room];
        dayPill.textContent = `${times[state.time]} · ${place}`;
      }

      function updateMeters() {
        const items = [
          ["精神", state.energy],
          ["开心", state.happiness],
          ["肚子", 100 - state.hunger],
          ["干净", state.clean],
        ];
        metersEl.innerHTML = items
          .map(
            ([name, value]) => `
              <div class="meter">
                <span>${name}</span>
                <div class="bar"><div class="fill" style="width:${value}%"></div></div>
                <b>${value}</b>
              </div>
            `,
          )
          .join("");
      }

      function updateOutfits() {
        outfitsEl.innerHTML = outfits
          .map(
            (item) => `
              <button class="outfit ${state.outfit === item.id ? "active" : ""}" data-outfit="${item.id}" title="${item.name}">
                <span class="swatch" style="background:${item.color}"></span>
                ${item.name}
              </button>
            `,
          )
          .join("");
        shoesEl.innerHTML = shoes
          .map(
            (item) => `
              <button class="outfit ${state.shoes === item.id ? "active" : ""}" data-shoes="${item.id}" title="${item.name}">
                <span class="swatch shoe-swatch" style="background:${item.color}"></span>
                ${item.name}
              </button>
            `,
          )
          .join("");
      }

      function updateMenuCard() {
        if (!state.menu) {
          menuCard.textContent = "去菜市场摊主旁边按 ↑，会自动买菜并安排今天煮什么饭。";
          return;
        }
        menuCard.innerHTML = `<strong>今天煮：${state.menu.meal}</strong><br>买了：${state.menu.items.join("、")}。`;
      }

      function outfitColor() {
        return outfits.find((item) => item.id === state.outfit).color;
      }

      function shoeColor() {
        return shoes.find((item) => item.id === state.shoes).color;
      }

      function roundedRect(x, y, w, h, r, color, stroke = "#334042") {
        ctx.fillStyle = color;
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
        ctx.fill();
        ctx.stroke();
      }

      function label(text, x, y, color = "#253238") {
        ctx.fillStyle = color;
        ctx.font = "900 22px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(text, x, y);
      }

      function drawSkyGround(sky, ground) {
        const skyGradient = ctx.createLinearGradient(0, 0, 0, groundY);
        skyGradient.addColorStop(0, "#7fc5ea");
        skyGradient.addColorStop(0.55, sky);
        skyGradient.addColorStop(1, "#d9f0f6");
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const grassGradient = ctx.createLinearGradient(0, groundY, 0, canvas.height);
        grassGradient.addColorStop(0, "#a8d07b");
        grassGradient.addColorStop(0.55, ground);
        grassGradient.addColorStop(1, "#6faf61");
        ctx.fillStyle = grassGradient;
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

        const sun = ctx.createRadialGradient(840, 86, 8, 840, 86, 62);
        sun.addColorStop(0, "rgba(255, 236, 132, 0.95)");
        sun.addColorStop(1, "rgba(255, 236, 132, 0)");
        ctx.fillStyle = sun;
        ctx.beginPath();
        ctx.arc(840, 86, 62, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.56)";
        for (const x of [120, 330, 570, 780]) {
          ctx.beginPath();
          ctx.ellipse(x, 96, 48, 18, 0, 0, Math.PI * 2);
          ctx.ellipse(x + 42, 92, 34, 16, 0, 0, Math.PI * 2);
          ctx.ellipse(x - 40, 100, 30, 14, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        for (const x of [46, 168, 286, 620, 700, 892]) {
          ctx.fillStyle = "#f7df6a";
          ctx.beginPath();
          ctx.arc(x, groundY + 26, 7, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#4d8b55";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(x, groundY + 34);
          ctx.lineTo(x, groundY + 47);
          ctx.stroke();
        }
      }

      function drawHouse(x, y, w, h, body, roof, text) {
        ctx.save();
        ctx.shadowColor = "rgba(33, 44, 45, 0.22)";
        ctx.shadowBlur = 16;
        ctx.shadowOffsetY = 9;
        ctx.fillStyle = roof;
        ctx.beginPath();
        ctx.moveTo(x - 24, y);
        ctx.lineTo(x + w / 2, y - 80);
        ctx.lineTo(x + w + 24, y);
        ctx.closePath();
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "#334042";
        ctx.lineWidth = 5;
        ctx.stroke();
        roundedRect(x, y, w, h, 8, body);
        roundedRect(x + 22, y + 78, 48, 46, 6, "#bde4f3");
        roundedRect(x + w - 70, y + 78, 48, 46, 6, "#bde4f3");
        roundedRect(x + w / 2 - 24, y + h - 72, 48, 72, 5, "#8a6042");
        ctx.fillStyle = "#253238";
        ctx.font = text.length > 5 ? "900 18px system-ui, sans-serif" : "900 22px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(text, x + w / 2, y + 42);
        ctx.fillStyle = "#f6d77a";
        ctx.fillRect(x + w / 2 + 9, y + h - 36, 6, 6);
        ctx.restore();
      }

      function drawDoorHint(x, y, text) {
        ctx.fillStyle = "rgba(255,253,246,0.94)";
        ctx.strokeStyle = "#334042";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(x - 86, y - 52, 172, 38, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#253238";
        ctx.font = "900 16px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(text, x, y - 27);
      }

      function drawStreet() {
        drawSkyGround("#a7d9f0", "#8ec46f");
        ctx.fillStyle = "#d7bd82";
        ctx.fillRect(0, groundY + 40, canvas.width, 44);
        drawHouse(80, 260, 210, 224, "#ffe2a5", "#d86155", "小丫丫的家");
        drawHouse(655, 266, 220, 218, "#ffd7c3", "#7f9fd0", "小浣熊家");
        drawMarketSign(400, 330);
        drawYayaNpc(320, groundY);
        drawNpc(438, groundY, "redPanda");
        speech("小丫丫：小鸭子，出发！", 306, 304, 190);
        speech("小熊猫：我也在家门口。", 440, 250, 190);
        drawDoorHint(185, 258, "门口按 ↑ 进家");
        drawDoorHint(510, 350, "按 ↑ 去菜市场");
        drawDoorHint(765, 258, "按 ↑ 去小浣熊家");
      }

      function drawMarketSign(x, y) {
        roundedRect(x, y, 210, 150, 8, "#fff4ca");
        ctx.fillStyle = "#e96368";
        ctx.fillRect(x - 4, y - 52, 218, 52);
        ctx.fillStyle = "#fff0be";
        for (let i = 0; i < 5; i += 1) ctx.fillRect(x + i * 43, y - 52, 22, 52);
        ctx.strokeStyle = "#334042";
        ctx.lineWidth = 4;
        ctx.strokeRect(x - 4, y - 52, 218, 52);
        label("菜市场", x + 105, y + 48);
        ctx.font = "34px serif";
        ctx.fillText("🥬  🥕  🍅", x + 105, y + 104);
      }

      function drawMarket() {
        drawSkyGround("#a7dff1", "#e0c58a");
        drawMarketSign(94, 300);
        roundedRect(356, 378, 112, 76, 8, "#f6d59a");
        roundedRect(500, 382, 112, 72, 8, "#f6d59a");
        roundedRect(644, 378, 112, 76, 8, "#f6d59a");
        ctx.font = "38px serif";
        ctx.textAlign = "center";
        ctx.fillText("🥬", 412, 428);
        ctx.fillText("🥚", 556, 430);
        ctx.fillText("🍅", 700, 428);
        drawNpc(250, groundY, "vendor");
        drawNpc(770, groundY, "redPanda");
        speech("摊主：站近一点按 ↑ 买菜。", 250, 286, 218);
        drawDoorHint(70, 452, "按 ↑ 回街上");
      }

      function drawNeighbor() {
        drawSkyGround("#b1dff2", "#a9ca74");
        drawHouse(610, 260, 220, 224, "#ffd7c3", "#7f9fd0", "小浣熊家");
        drawNpc(725, groundY, "raccoon");
        drawYayaNpc(410, groundY);
        drawNpc(285, groundY, "redPanda");
        speech("小浣熊：来玩拼图吧！", 725, 284, 198);
        speech("小丫丫：小鸭子真会走！", 410, 300, 190);
        drawDoorHint(80, 452, "按 ↑ 回街上");
      }

      function drawRoom() {
        ctx.fillStyle = "#ffe9be";
        ctx.fillRect(0, 0, canvas.width, groundY);
        ctx.fillStyle = "#ead5b4";
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        for (let x = 0; x < canvas.width; x += 80) {
          ctx.strokeStyle = "rgba(255,255,255,0.22)";
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, groundY);
          ctx.stroke();
        }

        if (state.room === "bedroom") {
          drawFurniture(92, 292, 230, 104, "小床", "🛏️");
          drawFurniture(612, 245, 190, 150, "衣柜", "👗");
          drawFurniture(372, 344, 170, 90, "书桌", "🖍️");
          drawClothesRack(565, 120);
          drawShoeRack(610, 412);
          drawDoorHint(82, 452, "按 ↑ 出门");
          drawDoorHint(808, 452, "按 ↑ 去厕所");
        }
        if (state.room === "bathroom") {
          drawFurniture(130, 298, 172, 126, "洗手台", "🪥");
          drawFurniture(388, 292, 172, 132, "马桶", "🚽");
          drawFurniture(640, 292, 210, 132, "浴缸", "🛁");
          drawDoorHint(82, 452, "按 ↑ 回卧室");
          drawDoorHint(808, 452, "按 ↑ 去客厅");
        }
        if (state.room === "living") {
          drawFurniture(115, 310, 270, 108, "沙发", "🛋️");
          drawFurniture(485, 286, 172, 130, "电视", "📺");
          drawFurniture(696, 308, 150, 100, "玩具箱", "🧸");
          drawDoorHint(82, 452, "按 ↑ 回厕所");
          drawDoorHint(808, 452, "按 ↑ 去厨房");
        }
        if (state.room === "kitchen") {
          drawFurniture(100, 286, 168, 134, "灶台", "🍳");
          drawFurniture(330, 276, 162, 144, "冰箱", "🧊");
          drawFurniture(565, 318, 240, 94, "餐桌", "🍚");
          drawDoorHint(82, 452, "按 ↑ 回客厅");
          drawDoorHint(808, 452, "按 ↑ 出门");
        }
      }

      function drawFurniture(x, y, w, h, name, icon) {
        roundedRect(x, y, w, h, 8, "rgba(255,253,246,0.94)");
        ctx.fillStyle = "#253238";
        ctx.font = "900 22px system-ui, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(name, x + 16, y + 32);
        ctx.font = "42px serif";
        ctx.textAlign = "right";
        ctx.fillText(icon, x + w - 18, y + h - 18);
      }

      function drawClothesRack(x, y) {
        ctx.strokeStyle = "#334042";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + 250, y);
        ctx.moveTo(x + 16, y);
        ctx.lineTo(x + 16, y + 112);
        ctx.moveTo(x + 234, y);
        ctx.lineTo(x + 234, y + 112);
        ctx.stroke();
        outfits.slice(0, 8).forEach((item, index) => {
          const px = x + 22 + index * 28;
          ctx.strokeStyle = "#334042";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(px + 10, y + 8);
          ctx.lineTo(px + 4, y + 20);
          ctx.lineTo(px + 16, y + 20);
          ctx.closePath();
          ctx.stroke();
          ctx.fillStyle = item.color;
          ctx.beginPath();
          ctx.moveTo(px, y + 26);
          ctx.lineTo(px + 20, y + 26);
          ctx.lineTo(px + 26, y + 72);
          ctx.lineTo(px - 6, y + 72);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        });
        label("好多漂亮衣服", x + 125, y - 12);
      }

      function drawShoeRack(x, y) {
        roundedRect(x, y, 222, 52, 8, "#fff7db");
        shoes.forEach((item, index) => {
          const px = x + 18 + index * 32;
          ctx.fillStyle = item.color;
          ctx.strokeStyle = "#334042";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(px, y + 18, 28, 15, 6);
          ctx.fill();
          ctx.stroke();
        });
        ctx.fillStyle = "#253238";
        ctx.font = "900 16px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("鞋子排排站", x + 111, y + 47);
      }

      function drawNpc(x, footY, type) {
        if (type === "raccoon") {
          drawRaccoon(x, footY);
          return;
        }
        if (type === "redPanda") {
          drawRedPanda(x, footY);
          return;
        }
        if (type === "duck") {
          drawDuck(x, footY);
          return;
        }
        if (type === "vendor") {
          drawPerson(x, footY, "#466f54", "#f1c65a", "摊主");
          return;
        }
        drawDuck(x, footY);
      }

      function drawRaccoon(x, footY) {
        ctx.save();
        ctx.translate(x, footY - 92);
        ctx.fillStyle = "#8e8a80";
        ctx.strokeStyle = "#2e3638";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(0, 42, 34, 45, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, 36, 0, Math.PI * 2);
        ctx.fillStyle = "#cfc8b6";
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#2f3438";
        ctx.fillRect(-28, -8, 56, 18);
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(-13, 0, 6, 0, Math.PI * 2);
        ctx.arc(13, 0, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#2e3638";
        ctx.beginPath();
        ctx.arc(-13, 0, 3, 0, Math.PI * 2);
        ctx.arc(13, 0, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#253238";
        ctx.font = "900 16px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("小浣熊", 0, 118);
        ctx.restore();
      }

      function drawRedPanda(x, footY) {
        ctx.save();
        ctx.translate(x, footY - 96);
        ctx.fillStyle = "#7a3f2d";
        ctx.strokeStyle = "#2e3638";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(38, 50, 16, 50, -0.34, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#c95f35";
        ctx.beginPath();
        ctx.ellipse(0, 48, 34, 44, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, 38, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#fff2dc";
        ctx.beginPath();
        ctx.ellipse(-13, 5, 12, 18, -0.45, 0, Math.PI * 2);
        ctx.ellipse(13, 5, 12, 18, 0.45, 0, Math.PI * 2);
        ctx.arc(0, 18, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#2e3638";
        ctx.beginPath();
        ctx.arc(-12, 0, 4, 0, Math.PI * 2);
        ctx.arc(12, 0, 4, 0, Math.PI * 2);
        ctx.arc(0, 14, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#253238";
        ctx.font = "900 16px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("小熊猫", 0, 122);
        ctx.restore();
      }

      function drawDuck(x, footY) {
        ctx.save();
        ctx.translate(x, footY - 92);
        ctx.shadowColor = "rgba(32, 40, 42, 0.2)";
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 6;
        const bodyGradient = ctx.createLinearGradient(-30, 0, 28, 84);
        bodyGradient.addColorStop(0, "#fff2a8");
        bodyGradient.addColorStop(1, "#f3c94e");
        ctx.fillStyle = bodyGradient;
        ctx.strokeStyle = "#2e3638";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(0, 48, 34, 42, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.shadowColor = "transparent";
        ctx.beginPath();
        ctx.arc(0, 2, 32, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.45)";
        ctx.beginPath();
        ctx.ellipse(-12, 37, 12, 20, -0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f19a3e";
        ctx.beginPath();
        ctx.moveTo(20, 4);
        ctx.lineTo(48, 14);
        ctx.lineTo(20, 23);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#2e3638";
        ctx.beginPath();
        ctx.arc(-9, -4, 4, 0, Math.PI * 2);
        ctx.arc(10, -4, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#2e3638";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 14, 10, 0.18, Math.PI - 0.18);
        ctx.stroke();
        ctx.fillStyle = "#f19a3e";
        ctx.beginPath();
        ctx.roundRect(-24, 86, 20, 9, 4);
        ctx.roundRect(5, 86, 20, 9, 4);
        ctx.fill();
        ctx.fillStyle = "#253238";
        ctx.font = "900 16px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("小鸭子", 0, 120);
        ctx.restore();
      }

      function drawPlayerDuck() {
        ctx.save();
        ctx.translate(player.x, player.y - 94);
        ctx.scale(player.facing, 1);
        ctx.shadowColor = "rgba(32, 40, 42, 0.28)";
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 8;
        const bodyGradient = ctx.createLinearGradient(-42, 0, 40, 98);
        bodyGradient.addColorStop(0, "#fff6b8");
        bodyGradient.addColorStop(0.5, "#ffe175");
        bodyGradient.addColorStop(1, "#eab83f");
        ctx.fillStyle = bodyGradient;
        ctx.strokeStyle = "#2e3638";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.ellipse(0, 52, 42, 48, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.shadowColor = "transparent";
        ctx.fillStyle = "rgba(255,255,255,0.48)";
        ctx.beginPath();
        ctx.ellipse(-15, 45, 15, 25, -0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ffe67f";
        ctx.beginPath();
        ctx.arc(0, 0, 38, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#f1993e";
        ctx.beginPath();
        ctx.moveTo(24, 2);
        ctx.lineTo(58, 14);
        ctx.lineTo(24, 26);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#2e3638";
        ctx.beginPath();
        ctx.arc(-12, -6, 5, 0, Math.PI * 2);
        ctx.arc(12, -6, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#2e3638";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 14, 12, 0.18, Math.PI - 0.18);
        ctx.stroke();
        ctx.fillStyle = outfitColor();
        ctx.strokeStyle = "#2e3638";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.roundRect(-28, 58, 56, 34, 10);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = shoeColor();
        ctx.beginPath();
        ctx.roundRect(-32, 91, 28, 12, 6);
        ctx.roundRect(5, 91, 28, 12, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#253238";
        ctx.font = "900 16px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("你的小鸭子", 0, 124);
        ctx.restore();
      }

      function drawPerson(x, footY, hair, clothes, name) {
        ctx.save();
        ctx.translate(x, footY - 118);
        ctx.fillStyle = hair;
        ctx.beginPath();
        ctx.ellipse(0, 16, 40, 34, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ffd8b1";
        ctx.strokeStyle = "#2e3638";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, 31, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#2e3638";
        ctx.beginPath();
        ctx.arc(-11, -3, 4, 0, Math.PI * 2);
        ctx.arc(11, -3, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#b95b62";
        ctx.beginPath();
        ctx.arc(0, 8, 10, 0.2, Math.PI - 0.2);
        ctx.stroke();
        roundedRect(-28, 34, 56, 62, 8, clothes);
        ctx.fillStyle = "#253238";
        ctx.font = "900 16px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(name, 0, 118);
        ctx.restore();
      }

      function drawYayaNpc(x, footY) {
        const savedPlayer = { x: player.x, y: player.y, facing: player.facing, height: player.height };
        player.x = x;
        player.y = footY;
        player.facing = 1;
        player.height = 116;
        drawYaya();
        player.x = savedPlayer.x;
        player.y = savedPlayer.y;
        player.facing = savedPlayer.facing;
        player.height = savedPlayer.height;
      }

      function speech(text, x, y, w) {
        ctx.fillStyle = "rgba(255,253,246,0.94)";
        ctx.strokeStyle = "#334042";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(x - w / 2, y - 44, w, 36, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#253238";
        ctx.font = "800 15px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(text, x, y - 21);
      }

      function drawYaya() {
        ctx.save();
        ctx.translate(player.x, player.y - player.height);
        ctx.scale(player.facing, 1);
        ctx.fillStyle = "#372b27";
        ctx.beginPath();
        ctx.arc(-30, 34, 16, 0, Math.PI * 2);
        ctx.arc(30, 34, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#372b27";
        ctx.beginPath();
        ctx.ellipse(0, 16, 38, 24, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ffd8b1";
        ctx.strokeStyle = "#2e3638";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 22, 32, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#2e3638";
        ctx.beginPath();
        ctx.arc(-12, 18, 4, 0, Math.PI * 2);
        ctx.arc(12, 18, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#b95b62";
        ctx.beginPath();
        ctx.arc(0, 27, 10, 0.15, Math.PI - 0.15);
        ctx.stroke();
        ctx.fillStyle = outfitColor();
        ctx.strokeStyle = "#2e3638";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-24, 58);
        ctx.lineTo(24, 58);
        ctx.lineTo(36, 112);
        ctx.lineTo(-36, 112);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#ffd8b1";
        for (const side of [-1, 1]) {
          ctx.beginPath();
          ctx.roundRect(side * 30 - 8, 66, 16, 42, 8);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.roundRect(side * 12 - 7, 108, 14, 34, 7);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = shoeColor();
          ctx.beginPath();
          ctx.roundRect(side * 12 - 12, 136, 24, 10, 5);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#ffd8b1";
        }
        ctx.restore();
      }

      function drawPrompt() {
        ctx.fillStyle = "rgba(255,253,246,0.96)";
        ctx.strokeStyle = "#334042";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(22, 18, canvas.width - 44, 48, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#253238";
        ctx.font = "900 18px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(state.prompt, canvas.width / 2, 49);
      }

      function jumpOrInteract() {
        if (tryInteract()) return;
        if (player.onGround) {
          player.vy = -15.5;
          player.onGround = false;
          state.prompt = "小鸭子跳起来啦！";
        }
      }

      function near(x, distance = 76) {
        return Math.abs(player.x - x) < distance;
      }

      function enterScene(scene, x) {
        state.scene = scene;
        player.x = x;
        player.y = groundY;
        player.vy = 0;
        player.onGround = true;
        updateDay();
      }

      function tryInteract() {
        if (state.scene === "street") {
          if (near(185)) {
            state.scene = "room";
            state.room = "bedroom";
            player.x = 130;
            state.prompt = "小鸭子进家啦。左右走，门口按 ↑ 换房间或出门。";
            updateDay();
            addStory("小鸭子自己走进了小丫丫的家。");
            return true;
          }
          if (near(510)) {
            enterScene("market", 92);
            state.prompt = "到菜市场了，走到摊主旁边按 ↑ 买菜。";
            addStory("小鸭子走到了菜市场。");
            return true;
          }
          if (near(765)) {
            enterScene("neighbor", 100);
            state.prompt = "到小浣熊家啦，走到小浣熊旁边按 ↑ 聊天。";
            addStory("小鸭子来到小浣熊家门口。");
            return true;
          }
        }

        if (state.scene === "market") {
          if (near(70)) {
            enterScene("street", 510);
            state.prompt = "回到街上啦。";
            return true;
          }
          if (near(250, 90)) {
            const plan = meals[(state.time + state.happiness + state.energy) % meals.length];
            state.menu = plan;
            state.coins = Math.max(0, state.coins - plan.cost);
            state.energy = clamp(state.energy - 5);
            state.happiness = clamp(state.happiness + 8);
            state.hunger = clamp(state.hunger + 7);
            passTime();
            updateMeters();
            updateMenuCard();
            state.prompt = `买好菜了：今天煮 ${plan.meal}。`;
            addStory(`摊主帮小鸭子配好 ${plan.items.join("、")}，今天自动安排煮 ${plan.meal}。`);
            return true;
          }
          if (near(770, 90)) {
            state.happiness = clamp(state.happiness + 4);
            updateMeters();
            state.prompt = "小熊猫说：小鸭子走路真稳！";
            addStory("小熊猫在菜市场陪小鸭子逛摊。");
            return true;
          }
        }

        if (state.scene === "neighbor") {
          if (near(80)) {
            enterScene("street", 765);
            state.prompt = "回到街上啦。";
            return true;
          }
          if (near(725, 95)) {
            state.energy = clamp(state.energy - 8);
            state.happiness = clamp(state.happiness + 14);
            state.hunger = clamp(state.hunger + 6);
            passTime();
            updateMeters();
            state.prompt = "小鸭子和小浣熊玩拼图，开心加好多。";
            addStory("小鸭子和小浣熊在家里玩拼图。");
            return true;
          }
          if (near(410, 95)) {
            state.prompt = "小丫丫说：按 ↑ 是跳，站近门口按 ↑ 就进门。";
            addStory("小丫丫认真提醒小鸭子方向键玩法。");
            return true;
          }
        }

        if (state.scene === "room") {
          const index = rooms.indexOf(state.room);
          if (near(82)) {
            if (index === 0) {
              enterScene("street", 185);
              state.prompt = "出门啦，可以去菜市场或小浣熊家。";
            } else {
              state.room = rooms[index - 1];
              player.x = 780;
              state.prompt = `来到${roomNames[state.room]}。`;
              updateDay();
            }
            return true;
          }
          if (near(808)) {
            if (index === rooms.length - 1) {
              enterScene("street", 185);
              state.prompt = "从厨房餐厅出门啦。";
            } else {
              state.room = rooms[index + 1];
              player.x = 150;
              state.prompt = `来到${roomNames[state.room]}。`;
              updateDay();
            }
            return true;
          }
          if (state.room === "bathroom" && near(388, 95)) {
            state.clean = clamp(state.clean + 15);
            passTime();
            updateMeters();
            state.prompt = "小鸭子洗洗小翅膀，干干净净。";
            addStory("小鸭子在厕所洗干净小翅膀。");
            return true;
          }
          if (state.room === "kitchen" && near(565, 120)) {
            state.hunger = clamp(state.hunger - 28);
            state.energy = clamp(state.energy + 8);
            state.happiness = clamp(state.happiness + 8);
            passTime();
            updateMeters();
            state.prompt = state.menu ? `吃饭啦：${state.menu.meal}。` : "冰箱里还有米饭，也可以先吃一点。";
            addStory(state.menu ? `厨房餐厅香喷喷，小鸭子吃了 ${state.menu.meal}。` : "小鸭子在厨房餐厅吃了一点米饭。");
            return true;
          }
        }

        return false;
      }

      function updatePlayer() {
        const speed = 5.2;
        if (keys.left) {
          player.x -= speed;
          player.facing = -1;
        }
        if (keys.right) {
          player.x += speed;
          player.facing = 1;
        }
        player.x = Math.max(44, Math.min(canvas.width - 44, player.x));
        player.vy += 0.72;
        player.y += player.vy;
        if (player.y >= groundY) {
          player.y = groundY;
          player.vy = 0;
          player.onGround = true;
        }
      }

      function draw() {
        if (state.scene === "street") drawStreet();
        if (state.scene === "market") drawMarket();
        if (state.scene === "neighbor") drawNeighbor();
        if (state.scene === "room") drawRoom();
        drawPlayerDuck();
        drawPrompt();
      }

      function frame() {
        updatePlayer();
        draw();
        requestAnimationFrame(frame);
      }

      function setKey(event, down) {
        if (["ArrowLeft", "ArrowRight", "ArrowUp", " "].includes(event.key)) event.preventDefault();
        if (event.key === "ArrowLeft") keys.left = down;
        if (event.key === "ArrowRight") keys.right = down;
        if (down && (event.key === "ArrowUp" || event.key === " ")) jumpOrInteract();
      }

      window.addEventListener("keydown", (event) => setKey(event, true));
      window.addEventListener("keyup", (event) => setKey(event, false));
      canvas.addEventListener("pointerdown", () => canvas.focus());

      document.querySelectorAll("[data-touch]").forEach((button) => {
        const key = button.dataset.touch;
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          canvas.focus();
          if (key === "up") jumpOrInteract();
          if (key === "left") keys.left = true;
          if (key === "right") keys.right = true;
        });
        button.addEventListener("pointerup", () => {
          if (key === "left") keys.left = false;
          if (key === "right") keys.right = false;
        });
        button.addEventListener("pointerleave", () => {
          if (key === "left") keys.left = false;
          if (key === "right") keys.right = false;
        });
      });

      outfitsEl.addEventListener("click", (event) => {
        const button = event.target.closest("[data-outfit]");
        if (!button) return;
        const item = outfits.find((outfit) => outfit.id === button.dataset.outfit);
        state.outfit = item.id;
        state.happiness = clamp(state.happiness + 3);
        state.prompt = `小鸭子穿上了${item.name}。`;
        updateOutfits();
        updateMeters();
        addStory(`小鸭子穿上${item.name}，准备自己出门玩。`);
        canvas.focus();
      });

      shoesEl.addEventListener("click", (event) => {
        const button = event.target.closest("[data-shoes]");
        if (!button) return;
        const item = shoes.find((shoe) => shoe.id === button.dataset.shoes);
        state.shoes = item.id;
        state.happiness = clamp(state.happiness + 2);
        state.prompt = `小鸭子穿上了${item.name}。`;
        updateOutfits();
        updateMeters();
        addStory(`小鸭子穿上${item.name}，脚步哒哒响。`);
        canvas.focus();
      });

      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function roundRect(x, y, w, h, r) {
          const radius = Math.min(r, w / 2, h / 2);
          this.moveTo(x + radius, y);
          this.arcTo(x + w, y, x + w, y + h, radius);
          this.arcTo(x + w, y + h, x, y + h, radius);
          this.arcTo(x, y + h, x, y, radius);
          this.arcTo(x, y, x + w, y, radius);
          return this;
        };
      }

      addStory("小鸭子站在家门口，等你用方向键控制它。");
      updateDay();
      updateMeters();
      updateOutfits();
      updateMenuCard();
      canvas.focus();
      frame();
    </script>
  </body>
</html>
