<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>云朵面包店</title>
    <style>
      :root {
        color-scheme: light;
        --page: #eef7f3;
        --panel: #fffdf8;
        --ink: #26313b;
        --muted: #63717d;
        --line: #d8e2d8;
        --sky: #9ed9f0;
        --sky-deep: #68b9d7;
        --grass: #6fc071;
        --grass-dark: #45895c;
        --soil: #8d6544;
        --soil-dark: #62422c;
        --bakery: #f3a85e;
        --roof: #d84b44;
        --coin: #f5c84c;
        --coin-dark: #b9791c;
        --hero: #48a7c6;
        --hero-dark: #287990;
        --danger: #464b58;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.76), transparent 220px),
          var(--page);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .app {
        width: min(100%, 1120px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .stats {
        width: min(100%, 560px);
        display: grid;
        grid-template-columns: repeat(4, minmax(76px, 1fr));
        gap: 8px;
      }

      .stat {
        min-height: 58px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.95);
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .stat strong {
        display: block;
        margin-top: 5px;
        font-size: 22px;
        line-height: 1;
      }

      .stage-wrap {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--panel);
        box-shadow: 0 18px 42px rgba(60, 89, 73, 0.14);
      }

      canvas {
        width: 100%;
        height: min(68vh, 680px);
        min-height: 430px;
        display: block;
        background: var(--sky);
        outline: none;
        touch-action: none;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .note {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        font-weight: 700;
      }

      button {
        min-height: 42px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: #2f7f65;
        color: #fff;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .touch-pad {
        position: fixed;
        left: 14px;
        right: 14px;
        bottom: 14px;
        display: none;
        justify-content: space-between;
        pointer-events: none;
      }

      .touch-group {
        display: grid;
        grid-template-columns: repeat(3, 48px);
        grid-template-rows: repeat(2, 48px);
        gap: 8px;
        pointer-events: auto;
      }

      .touch-button {
        width: 48px;
        height: 48px;
        padding: 0;
        border-radius: 8px;
        background: rgba(38, 49, 59, 0.72);
      }

      .touch-button.up {
        grid-column: 2;
      }

      .touch-button.left {
        grid-column: 1;
        grid-row: 2;
      }

      .touch-button.down {
        grid-column: 2;
        grid-row: 2;
      }

      .touch-button.right {
        grid-column: 3;
        grid-row: 2;
      }

      .jump-touch {
        align-self: end;
        width: 92px;
        height: 92px;
        border-radius: 50%;
        background: rgba(216, 75, 68, 0.82);
        pointer-events: auto;
      }

      @media (max-width: 720px) {
        .app {
          padding: 10px 10px 118px;
        }

        .stats {
          grid-template-columns: repeat(2, minmax(92px, 1fr));
        }

        canvas {
          height: 62vh;
          min-height: 390px;
        }

        .controls {
          grid-template-columns: 1fr;
        }

        .touch-pad {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="游戏信息">
        <h1>云朵面包店</h1>
        <div class="stats" aria-live="polite">
          <div class="stat"><span>金币</span><strong id="coins">0</strong></div>
          <div class="stat"><span>场景</span><strong id="clouds">地表</strong></div>
          <div class="stat"><span>矿石</span><strong id="bread">0</strong></div>
          <div class="stat"><span>道具</span><strong id="level">无</strong></div>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="game" tabindex="0" aria-label="云朵面包店小游戏"></canvas>
      </section>

      <section class="controls">
        <p class="note">小鸭子冒险：地表下键无限钻土，穿过地球到海洋；岛上洞口进矿洞，收矿石和水做传送门去城市，城市里可以开车串门。</p>
        <button id="reset" type="button">重新开始</button>
      </section>
    </main>

    <div class="touch-pad" aria-hidden="true">
      <div class="touch-group">
        <button class="touch-button up" data-touch="up" type="button">上</button>
        <button class="touch-button left" data-touch="left" type="button">左</button>
        <button class="touch-button down" data-touch="down" type="button">下</button>
        <button class="touch-button right" data-touch="right" type="button">右</button>
      </div>
      <button class="jump-touch" data-touch="jump" type="button">跳</button>
    </div>

    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const coinText = document.querySelector("#coins");
      const cloudText = document.querySelector("#clouds");
      const breadText = document.querySelector("#bread");
      const levelText = document.querySelector("#level");
      const resetButton = document.querySelector("#reset");

      const keys = new Set();
      const gravity = 1850;
      const coinRespawnTime = 2.5;
      const world = { w: 2500, h: 760, ground: 626 };
      const sceneNames = {
        earth: "地表",
        ocean: "海洋",
        island: "岛屿",
        mine: "矿洞",
        city: "城市",
        house: "房子",
        portalShop: "传送门店",
        itemShop: "道具店",
        craftShop: "合成店",
        underwaterCity: "地下水城",
        worldShop: "世界商店",
        deathLand: "死亡之地",
        helperLand: "助手之地",
      };
      const oreTypes = [
        { key: "diamond", label: "钻石", color: "#7ee5ff" },
        { key: "emerald", label: "绿宝石", color: "#45d16f" },
        { key: "amethyst", label: "紫水晶", color: "#a26bf2" },
        { key: "obsidian", label: "黑曜石", color: "#171923" },
        { key: "water", label: "水", color: "#4db7ff" },
      ];
      const bakery = { x: 1220, y: 306, w: 360, h: 320 };
      const island = { x: 520, y: 382, w: 700, h: 210, holeX: 835 };
      const portal = { x: 1150, y: 465, w: 96, h: 130 };
      const city = { ground: 596 };
      const cityDoors = [
        { x: 265, w: 54, scene: "house", label: "家" },
        { x: 495, w: 54, scene: "house", label: "家" },
        { x: 725, w: 54, scene: "house", label: "家" },
        { x: 955, w: 54, scene: "itemShop", label: "道具店" },
        { x: 1185, w: 54, scene: "craftShop", label: "合成店" },
        { x: 1415, w: 54, scene: "house", label: "家" },
        { x: 1612, w: 80, scene: "portalShop", label: "传送门店" },
      ];
      const portalDestinations = [
        { scene: "underwaterCity", label: "地下水城", color: "#3cc8ff" },
        { scene: "worldShop", label: "世界商店", color: "#f5c84c" },
        { scene: "deathLand", label: "死亡之地", color: "#40424d" },
        { scene: "helperLand", label: "助手之地", color: "#8ad36a" },
      ];

      let lastTime = 0;
      let cameraX = 0;
      let flash = "";
      let flashTime = 0;

      const startState = () => ({
        player: {
          x: 72,
          y: world.ground - 46,
          w: 48,
          h: 46,
          vx: 0,
          vy: 0,
          onGround: true,
          facing: 1,
          buried: false,
          digDepth: 0,
        },
        scene: "earth",
        coins: [],
        clouds: [],
        standingCloudId: null,
        activeCloudId: null,
        nextCloudId: 1,
        nextCloudX: 240,
        ores: [],
        materials: { diamond: 0, emerald: 0, amethyst: 0, obsidian: 0, water: 0 },
        portalBuilt: false,
        score: 0,
        bread: 0,
        car: { x: 680, y: city.ground - 34, inCar: false },
        allies: 0,
        helperEnemies: Array.from({ length: 5 }, (_, index) => ({
          x: 420 + index * 210,
          y: city.ground - 46,
          beaten: false,
        })),
      });

      let state = startState();

      function resize() {
        const rect = canvas.getBoundingClientRect();
        const ratio = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.round(rect.width * ratio);
        canvas.height = Math.round(rect.height * ratio);
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      }

      function viewScale() {
        return canvas.clientHeight / world.h;
      }

      function resetGame() {
        world.w = 2500;
        state = startState();
        buildWorld();
        cameraX = 0;
        showFlash("小鸭出发");
        updateStats();
        canvas.focus();
      }

      function buildWorld() {
        state.coins = [
          ...makeCoinLine(150, 1040, world.ground - 42, 16, 56),
          ...makeCoinLine(1292, 1532, world.ground - 44, 5, 54),
          ...makeCoinLine(180, 1540, world.ground + 74, 18, 78),
          ...makeCoinLine(250, 1600, world.ground + 118, 17, 84),
        ];
        ensureWorldAhead(2400);
        buildMine();
      }

      function makeCoinLine(startX, endX, y, count, step) {
        return Array.from({ length: count }, (_, index) => ({
          x: count === 1 ? startX : startX + index * step,
          y,
          r: 13,
          got: false,
          respawn: 0,
        })).filter((coin) => coin.x <= endX);
      }

      function makeCloud(x) {
        const index = state.nextCloudId;
        const ySteps = [500, 438, 376, 314, 252, 196, 260, 342];
        const cloud = {
          id: state.nextCloudId,
          x,
          y: ySteps[(index - 1) % ySteps.length],
          w: 164 + (index % 3) * 10,
          h: 34,
          active: true,
          visited: false,
        };
        state.nextCloudId += 1;
        return cloud;
      }

      function ensureWorldAhead(targetX) {
        while (state.nextCloudX < targetX) {
          const cloud = makeCloud(state.nextCloudX);
          state.clouds.push(cloud);
          state.coins.push(...makeCoinLine(cloud.x + 38, cloud.x + cloud.w - 30, cloud.y - 46, 3, 38));
          if (cloud.id % 2 === 0) {
            state.coins.push(...makeCoinLine(cloud.x + 8, cloud.x + 240, world.ground + 92, 4, 72));
          }
          state.nextCloudX += 146 + (cloud.id % 4) * 18;
        }
        world.w = Math.max(world.w, targetX + 520, bakery.x + bakery.w + 180);
      }

      function buildMine() {
        const positions = [
          ["diamond", 220, 574], ["diamond", 430, 552], ["emerald", 580, 574],
          ["emerald", 760, 552], ["amethyst", 930, 574], ["amethyst", 1120, 552],
          ["obsidian", 1260, 574], ["obsidian", 1390, 552], ["obsidian", 1510, 574],
          ["obsidian", 1600, 552], ["water", 1700, 574], ["water", 1810, 552],
        ];
        state.ores = positions.map(([type, x, y], index) => ({ id: index, type, x, y, r: 18, got: false }));
      }

      function showFlash(text) {
        flash = text;
        flashTime = 1.3;
      }

      function materialCount() {
        return Object.values(state.materials).reduce((sum, value) => sum + value, 0);
      }

      function toolText() {
        if (state.car.inCar) return "开车";
        if (state.allies > 0) return `助手${state.allies}`;
        if (state.portalBuilt) return "传送门";
        if (state.materials.obsidian >= 4 && state.materials.water >= 1) return "可造门";
        return "无";
      }

      function updateStats() {
        coinText.textContent = state.score;
        cloudText.textContent = sceneNames[state.scene];
        breadText.textContent = materialCount();
        levelText.textContent = toolText();
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function circleRectOverlap(circle, rect) {
        const cx = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
        const cy = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
        const dx = circle.x - cx;
        const dy = circle.y - cy;
        return dx * dx + dy * dy < circle.r * circle.r;
      }

      function setScene(scene) {
        state.scene = scene;
        state.player.buried = false;
        state.activeCloudId = null;
        state.standingCloudId = null;
        state.car.inCar = false;
        if (scene === "earth") {
          world.w = 2500;
          state.player.x = 80;
          state.player.y = world.ground - state.player.h;
        }
        if (scene === "ocean") {
          world.w = 1600;
          state.player.x = 80;
          state.player.y = 420;
        }
        if (scene === "island") {
          world.w = 1600;
          state.player.x = 120;
          state.player.y = island.y - state.player.h;
        }
        if (scene === "mine") {
          world.w = 1900;
          state.player.x = 90;
          state.player.y = world.ground - state.player.h;
        }
        if (scene === "city") {
          world.w = 2200;
          state.player.x = 100;
          state.player.y = city.ground - state.player.h;
        }
        if (["house", "portalShop", "itemShop", "craftShop"].includes(scene)) {
          world.w = 1280;
          state.player.x = 120;
          state.player.y = city.ground - state.player.h;
        }
        if (scene === "underwaterCity") {
          world.w = 1600;
          state.player.x = 120;
          state.player.y = 430;
        }
        if (scene === "worldShop") {
          world.w = 1600;
          state.player.x = 120;
          state.player.y = city.ground - state.player.h;
        }
        if (scene === "deathLand") {
          world.w = 1600;
          state.player.x = 120;
          state.player.y = city.ground - state.player.h;
        }
        if (scene === "helperLand") {
          world.w = 1600;
          state.player.x = 120;
          state.player.y = city.ground - state.player.h;
        }
        cameraX = 0;
        showFlash(sceneNames[scene]);
      }

      function jump(power = 690) {
        const p = state.player;
        if (p.buried || state.car.inCar) return;
        if (p.onGround && state.scene !== "ocean") {
          state.activeCloudId = null;
          state.standingCloudId = null;
          p.vy = -power;
          p.onGround = false;
        }
      }

      function activeCloud() {
        return state.clouds.find((cloud) => cloud.id === state.activeCloudId);
      }

      function startDrivingCloud() {
        if (state.scene !== "earth" || state.player.buried || state.standingCloudId === null) return;
        state.activeCloudId = state.standingCloudId;
        showFlash("开云");
      }

      function burrow() {
        const p = state.player;
        const onSoil = Math.abs(p.y + p.h - world.ground) < 7;
        if (state.scene !== "earth" || p.buried || !p.onGround || state.activeCloudId !== null || !onSoil) return;
        state.activeCloudId = null;
        state.standingCloudId = null;
        p.buried = true;
        p.y = world.ground + 42;
        p.vx = 0;
        p.vy = 0;
        showFlash("无限钻土");
      }

      function leaveSoil() {
        const p = state.player;
        p.buried = false;
        p.y = world.ground - p.h;
        p.vx = 0;
        p.vy = 0;
        p.onGround = true;
        showFlash("出土");
      }

      function collectMaterial(type) {
        state.materials[type] += 1;
        const ore = oreTypes.find((item) => item.key === type);
        showFlash(`${ore.label} +1`);
      }

      function tryBuildPortal() {
        if (state.scene !== "mine") return;
        const p = state.player;
        const nearPortal = Math.abs(p.x - portal.x) < 160;
        if (!nearPortal) return;
        if (state.portalBuilt) {
          setScene("city");
          return;
        }
        if (state.materials.obsidian >= 4 && state.materials.water >= 1) {
          state.materials.obsidian -= 4;
          state.materials.water -= 1;
          state.portalBuilt = true;
          showFlash("传送门做好了");
        } else {
          showFlash("要黑曜石4和水1");
        }
      }

      function tryUseCityThings() {
        const p = state.player;
        if (state.scene !== "city") return;
        if (Math.abs(p.x - state.car.x) < 70) {
          state.car.inCar = !state.car.inCar;
          p.y = city.ground - p.h;
          showFlash(state.car.inCar ? "上车" : "下车");
          return;
        }
        if (p.x > 1450 && p.x < 1660) {
          showFlash("小鸭店员卖传送门");
          state.portalBuilt = true;
        }
      }

      function nearX(x, distance = 62) {
        return Math.abs(state.player.x - x) < distance;
      }

      function returnToCity(x = 1200) {
        setScene("city");
        state.player.x = x;
        state.player.y = city.ground - state.player.h;
        cameraX = Math.max(0, state.player.x - 420);
      }

      function tryEnterDoor() {
        const p = state.player;
        if (state.scene !== "city" || state.car.inCar) return false;
        const door = cityDoors.find((item) => p.x + p.w > item.x && p.x < item.x + item.w);
        if (!door) return false;
        setScene(door.scene);
        showFlash(`进入${door.label}`);
        return true;
      }

      function usePortalShop() {
        const index = Math.floor((state.player.x - 250) / 220);
        const destination = portalDestinations[index];
        if (!destination) return false;
        setScene(destination.scene);
        showFlash(destination.label);
        return true;
      }

      function useItemShop() {
        if (!nearX(620, 120)) return false;
        if (state.score < 5) {
          showFlash("要5金币");
          return true;
        }
        state.score -= 5;
        state.materials.diamond += 1;
        showFlash("买到钻石");
        return true;
      }

      function useCraftShop() {
        if (!nearX(650, 160)) return false;
        if (state.materials.diamond >= 1 && state.materials.emerald >= 1 && state.materials.obsidian >= 1) {
          state.materials.diamond -= 1;
          state.materials.emerald -= 1;
          state.materials.obsidian -= 1;
          state.portalBuilt = true;
          showFlash("合成传送门");
        } else {
          showFlash("要钻石绿宝石黑曜石");
        }
        return true;
      }

      function useCurrentPlace() {
        if (tryEnterDoor()) return;
        if (["house", "portalShop", "itemShop", "craftShop", "worldShop"].includes(state.scene) && state.player.x < 80) {
          returnToCity();
          return;
        }
        if (state.scene === "portalShop" && usePortalShop()) return;
        if (state.scene === "itemShop" && useItemShop()) return;
        if (state.scene === "craftShop" && useCraftShop()) return;
        if (state.scene === "worldShop" && nearX(620, 150)) {
          state.score += 10;
          showFlash("世界商店金币+10");
        }
      }

      function attackHelper() {
        if (state.scene !== "helperLand") return false;
        const enemy = state.helperEnemies.find((item) => !item.beaten && Math.abs(item.x - state.player.x) < 70);
        if (!enemy) return false;
        enemy.beaten = true;
        state.allies += 1;
        showFlash("助手加入");
        return true;
      }

      function handleInput(dt) {
        const p = state.player;
        let move = 0;
        if (keys.has("ArrowLeft") || keys.has("KeyA")) move -= 1;
        if (keys.has("ArrowRight") || keys.has("KeyD")) move += 1;
        if (move !== 0) p.facing = move;

        if (["house", "portalShop", "itemShop", "craftShop", "worldShop", "underwaterCity", "deathLand", "helperLand"].includes(state.scene) && keys.has("ArrowDown")) {
          returnToCity();
          return;
        }

        if (state.scene === "ocean" || state.scene === "underwaterCity") {
          const swim = 250;
          let swimY = 0;
          if (keys.has("ArrowUp")) swimY -= 1;
          if (keys.has("ArrowDown")) swimY += 1;
          p.x += move * swim * dt;
          p.y += swimY * swim * dt;
          p.y = Math.max(145, Math.min(550, p.y));
          if (state.scene === "ocean" && p.x > island.x - 40) setScene("island");
          return;
        }

        if (state.car.inCar) {
          const carSpeed = 360;
          state.car.x += move * carSpeed * dt;
          state.car.x = Math.max(90, Math.min(world.w - 140, state.car.x));
          p.x = state.car.x + 28;
          p.y = city.ground - p.h - 24;
          return;
        }

        if (p.buried) {
          const digSpeed = 230;
          p.x += move * digSpeed * dt;
          if (keys.has("ArrowDown")) {
            p.digDepth += 42 * dt;
            p.y = Math.min(world.h - 38, p.y + digSpeed * dt);
          }
          if (keys.has("ArrowUp")) p.y -= digSpeed * dt;
          p.y = Math.max(world.ground + 18, Math.min(world.h - 38, p.y));
          if (keys.has("ArrowUp") && p.y <= world.ground + 20) leaveSoil();
          if (p.digDepth > 10) setScene("ocean");
          return;
        }

        const cloud = activeCloud();
        if (cloud && state.scene === "earth") {
          const cloudSpeed = 250;
          let cloudMoveY = 0;
          if (keys.has("ArrowUp")) cloudMoveY -= 1;
          if (keys.has("ArrowDown")) cloudMoveY += 1;
          const oldX = cloud.x;
          const oldY = cloud.y;
          cloud.x += move * cloudSpeed * dt;
          cloud.y += cloudMoveY * cloudSpeed * dt;
          cloud.x = Math.max(24, Math.min(world.w - cloud.w - 24, cloud.x));
          cloud.y = Math.max(92, Math.min(world.ground - 74, cloud.y));
          p.x += cloud.x - oldX;
          p.y += cloud.y - oldY;
          p.y = cloud.y - p.h;
          p.vy = 0;
          p.onGround = true;
          return;
        }

        const walkSpeed = state.scene === "city" ? 260 : 230;
        p.x += move * walkSpeed * dt;
        if (state.scene === "earth" && keys.has("ArrowDown")) burrow();
      }

      function currentGround() {
        if (state.scene === "island") return island.y;
        if (state.scene === "city" || state.scene === "house" || state.scene === "portalShop" || state.scene === "itemShop" || state.scene === "craftShop" || state.scene === "worldShop" || state.scene === "deathLand" || state.scene === "helperLand") return city.ground;
        return world.ground;
      }

      function update(dt) {
        const p = state.player;
        flashTime = Math.max(0, flashTime - dt);
        if (flashTime === 0) flash = "";
        const visibleWorldWidth = canvas.clientWidth / viewScale();
        if (state.scene === "earth") ensureWorldAhead(cameraX + visibleWorldWidth + 1200);
        handleInput(dt);

        p.x = Math.max(16, Math.min(world.w - p.w - 16, p.x));
        const ground = currentGround();
        if (!p.buried && state.scene !== "ocean" && state.scene !== "underwaterCity" && !state.car.inCar) {
          p.vy += gravity * dt;
          p.y += p.vy * dt;
          if (p.y + p.h >= ground) {
            p.y = ground - p.h;
            p.vy = 0;
            p.onGround = true;
            state.activeCloudId = null;
            state.standingCloudId = null;
          }
        }

        const playerRect = { x: p.x, y: p.y, w: p.w, h: p.buried ? 22 : p.h };
        if (state.scene === "earth" && !p.buried) {
          state.standingCloudId = state.activeCloudId;
          for (const cloud of state.clouds) {
            const softCloudTop = { x: cloud.x - 20, y: cloud.y, w: cloud.w + 40, h: cloud.h };
            const landing = p.vy >= 0 && p.y + p.h <= cloud.y + 32 && rectsOverlap(playerRect, softCloudTop);
            if (landing) {
              cloud.visited = true;
              state.standingCloudId = cloud.id;
              p.y = cloud.y - p.h;
              p.vy = 0;
              p.onGround = true;
            }
          }
        }

        if (state.scene === "island") {
          const hole = { x: island.holeX, y: island.y - 4, w: 78, h: 26 };
          if (p.vy >= 0 && rectsOverlap(playerRect, hole)) setScene("mine");
        }

        if (state.scene === "mine") {
          for (const ore of state.ores) {
            if (!ore.got && circleRectOverlap(ore, playerRect)) {
              ore.got = true;
              collectMaterial(ore.type);
            }
          }
        }

        for (const coin of state.coins) {
          const visibleInScene = state.scene === "earth" || (state.scene === "city" && coin.y < city.ground);
          if (!visibleInScene) continue;
          if (coin.got) {
            coin.respawn -= dt;
            if (coin.respawn <= 0) {
              coin.got = false;
              coin.respawn = 0;
            }
          }
          if (!coin.got && circleRectOverlap(coin, playerRect)) {
            coin.got = true;
            coin.respawn = coinRespawnTime;
            state.score += 1;
            showFlash("金币 +1");
          }
        }

        cameraX = Math.max(0, Math.min(world.w - visibleWorldWidth, p.x - visibleWorldWidth * 0.42));
        updateStats();
      }

      function drawCloud(cloud) {
        ctx.save();
        ctx.translate(cloud.x - cameraX, cloud.y);
        const isDriven = cloud.id === state.activeCloudId;
        const isStanding = cloud.id === state.standingCloudId;
        ctx.fillStyle = isDriven ? "#fff6c8" : "#fffdf5";
        ctx.strokeStyle = isDriven ? "#d99b35" : isStanding ? "#3e9abd" : "#86b9cf";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(26, 23, 27, 18, 0, 0, Math.PI * 2);
        ctx.ellipse(62, 15, 36, 23, 0, 0, Math.PI * 2);
        ctx.ellipse(100, 23, 32, 18, 0, 0, Math.PI * 2);
        ctx.rect(22, 20, cloud.w - 42, 22);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawCoin(coin) {
        if (coin.got) return;
        const x = coin.x - cameraX;
        ctx.fillStyle = "#f5c84c";
        ctx.strokeStyle = "#b9791c";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, coin.y, coin.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(255, 255, 255, 0.58)";
        ctx.fillRect(x - 3, coin.y - 9, 6, 18);
      }

      function drawDuck(x, y, scale = 1, facing = 1) {
        ctx.save();
        ctx.translate(x + (facing < 0 ? 46 * scale : 0), y);
        ctx.scale(facing * scale, scale);
        ctx.fillStyle = "#ffd84d";
        ctx.beginPath();
        ctx.ellipse(24, 28, 22, 16, 0, 0, Math.PI * 2);
        ctx.ellipse(34, 13, 13, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f27a3a";
        ctx.beginPath();
        ctx.ellipse(48, 14, 10, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#26313b";
        ctx.beginPath();
        ctx.arc(38, 9, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f3a73a";
        ctx.fillRect(13, 42, 8, 4);
        ctx.fillRect(31, 42, 8, 4);
        ctx.restore();
      }

      function drawPlayer() {
        const p = state.player;
        const x = p.x - cameraX;
        if (p.buried) {
          ctx.fillStyle = "rgba(98, 66, 44, 0.42)";
          ctx.beginPath();
          ctx.ellipse(x + p.w / 2, p.y + 30, 34, 14, 0, 0, Math.PI * 2);
          ctx.fill();
          drawDuck(x, p.y + 4, 0.72, p.facing);
          return;
        }
        if (state.car.inCar) return;
        drawDuck(x, p.y, 1, p.facing);
      }

      function drawBakery(x, y, title = "面包店") {
        ctx.fillStyle = "#f3a85e";
        ctx.fillRect(x + 24, y + 58, 280, 230);
        ctx.fillStyle = "#d84b44";
        ctx.beginPath();
        ctx.moveTo(x, y + 78);
        ctx.lineTo(x + 164, y);
        ctx.lineTo(x + 328, y + 78);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#6f3b2a";
        ctx.fillRect(x + 132, y + 176, 64, 112);
        ctx.fillStyle = "#f8e4bd";
        ctx.fillRect(x + 48, y + 130, 70, 58);
        ctx.fillRect(x + 218, y + 130, 62, 58);
        ctx.fillStyle = "#75442e";
        ctx.font = "900 20px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(title, x + 164, y + 114);
      }

      function drawEarthBackground() {
        const scale = viewScale();
        const w = canvas.clientWidth / scale;
        const skyGradient = ctx.createLinearGradient(0, 0, 0, world.h);
        skyGradient.addColorStop(0, "#9ed9f0");
        skyGradient.addColorStop(0.62, "#dff6f1");
        skyGradient.addColorStop(1, "#ecf5df");
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, w, world.h);
        ctx.fillStyle = "rgba(255,255,255,0.42)";
        for (let i = 0; i < 7; i += 1) {
          const x = ((i * 270 - cameraX * 0.18) % (w + 180)) - 90;
          ctx.beginPath();
          ctx.ellipse(x, 78 + (i % 3) * 34, 44, 17, 0, 0, Math.PI * 2);
          ctx.ellipse(x + 42, 74 + (i % 3) * 34, 38, 15, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = "#6fc071";
        ctx.fillRect(-cameraX, world.ground, world.w, world.h - world.ground);
        ctx.fillStyle = "#8d6544";
        ctx.fillRect(-cameraX, world.ground + 34, world.w, world.h - world.ground - 34);
        ctx.fillStyle = "rgba(98, 66, 44, 0.36)";
        for (let i = 0; i < 72; i += 1) {
          ctx.fillRect(i * 36 - (cameraX % 36), world.ground + 58 + (i % 5) * 18, 16, 5);
        }
      }

      function drawOceanBackground() {
        const scale = viewScale();
        const w = canvas.clientWidth / scale;
        ctx.fillStyle = "#9ed9f0";
        ctx.fillRect(0, 0, w, world.h);
        ctx.fillStyle = "#4db7ff";
        ctx.fillRect(0, 190, w, world.h - 190);
        ctx.fillStyle = "rgba(255,255,255,0.35)";
        for (let i = 0; i < 10; i += 1) ctx.fillRect(i * 180 - (cameraX % 180), 260 + (i % 5) * 42, 84, 7);
        drawIsland();
      }

      function drawIsland() {
        const x = island.x - cameraX;
        ctx.fillStyle = "#e0b66c";
        ctx.beginPath();
        ctx.ellipse(x + island.w / 2, island.y + 115, island.w / 2, 118, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#61b96f";
        ctx.fillRect(x + 44, island.y - 12, island.w - 88, 40);
        ctx.fillStyle = "#2b2f39";
        ctx.beginPath();
        ctx.ellipse(x + island.holeX - island.x + 40, island.y + 1, 42, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#6f4a2e";
        ctx.fillRect(x + 250, island.y - 108, 18, 102);
        ctx.fillStyle = "#2f8b56";
        ctx.beginPath();
        ctx.ellipse(x + 260, island.y - 128, 72, 34, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawMineBackground() {
        const scale = viewScale();
        const w = canvas.clientWidth / scale;
        ctx.fillStyle = "#2d3139";
        ctx.fillRect(0, 0, w, world.h);
        ctx.fillStyle = "#49423d";
        ctx.fillRect(-cameraX, world.ground, world.w, world.h - world.ground);
        ctx.fillStyle = "#3a3634";
        for (let i = 0; i < 80; i += 1) ctx.fillRect(i * 42 - (cameraX % 42), 120 + (i % 12) * 44, 22, 8);
        for (const ore of state.ores) {
          if (ore.got) continue;
          const type = oreTypes.find((item) => item.key === ore.type);
          ctx.fillStyle = type.color;
          ctx.beginPath();
          ctx.arc(ore.x - cameraX, ore.y, ore.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.45)";
          ctx.stroke();
        }
        drawPortal();
      }

      function drawPortal() {
        const x = portal.x - cameraX;
        ctx.strokeStyle = state.portalBuilt ? "#7d5cff" : "#171923";
        ctx.lineWidth = 12;
        ctx.strokeRect(x, portal.y, portal.w, portal.h);
        if (state.portalBuilt) {
          ctx.fillStyle = "rgba(125, 92, 255, 0.48)";
          ctx.fillRect(x + 12, portal.y + 12, portal.w - 24, portal.h - 24);
        } else {
          ctx.fillStyle = "#4db7ff";
          ctx.fillRect(x + 26, portal.y + portal.h + 8, 44, 18);
        }
      }

      function drawCityBackground() {
        const scale = viewScale();
        const w = canvas.clientWidth / scale;
        ctx.fillStyle = "#b8d9ea";
        ctx.fillRect(0, 0, w, world.h);
        ctx.fillStyle = "#6c737f";
        ctx.fillRect(-cameraX, city.ground, world.w, world.h - city.ground);
        for (let i = 0; i < 6; i += 1) {
          const houseX = 220 + i * 230;
          const door = cityDoors[i];
          drawHouse(houseX - cameraX, city.ground - 170, i, door?.label || "家");
        }
        drawBakery(1480 - cameraX, city.ground - 288, "传送门店");
        drawDuck(1536 - cameraX, city.ground - 56, 0.78, -1);
        drawLabel(1650 - cameraX, city.ground - 308, "按上进门");
        drawCar(state.car.x - cameraX, state.car.y);
      }

      function drawHouse(x, y, i, label = "家") {
        ctx.fillStyle = ["#b5d6a7", "#f1c27d", "#b9b0e8"][i % 3];
        ctx.fillRect(x, y, 120, 170);
        ctx.fillStyle = "#d84b44";
        ctx.beginPath();
        ctx.moveTo(x - 12, y + 18);
        ctx.lineTo(x + 60, y - 38);
        ctx.lineTo(x + 132, y + 18);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#fff0bd";
        ctx.fillRect(x + 20, y + 46, 28, 34);
        ctx.fillRect(x + 72, y + 46, 28, 34);
        ctx.fillStyle = "#5b3a2b";
        ctx.fillRect(x + 45, y + 104, 34, 66);
        drawLabel(x + 60, y - 58, label);
      }

      function drawCar(x, y) {
        ctx.fillStyle = "#e85d52";
        ctx.fillRect(x, y, 108, 28);
        ctx.fillStyle = "#ffb44a";
        ctx.fillRect(x + 22, y - 24, 54, 26);
        ctx.fillStyle = "#dff6ff";
        ctx.fillRect(x + 30, y - 18, 20, 16);
        ctx.fillStyle = "#26313b";
        ctx.beginPath();
        ctx.arc(x + 24, y + 30, 12, 0, Math.PI * 2);
        ctx.arc(x + 84, y + 30, 12, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawLabel(x, y, text) {
        ctx.fillStyle = "rgba(38,49,59,0.82)";
        ctx.fillRect(x - 48, y - 18, 96, 26);
        ctx.fillStyle = "#fffdf8";
        ctx.font = "900 14px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(text, x, y);
      }

      function drawInteriorBase(title, wall = "#fff0d2") {
        const scale = viewScale();
        const w = canvas.clientWidth / scale;
        ctx.fillStyle = wall;
        ctx.fillRect(0, 0, w, world.h);
        ctx.fillStyle = "#b77b53";
        ctx.fillRect(-cameraX, city.ground, world.w, world.h - city.ground);
        ctx.fillStyle = "#5b3a2b";
        ctx.fillRect(28 - cameraX, city.ground - 94, 58, 94);
        ctx.fillStyle = "#26313b";
        ctx.font = "900 24px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`${title}  下键出门`, 110 - cameraX, 86);
      }

      function drawHouseInterior() {
        drawInteriorBase("小鸭的家", "#f4edda");
        drawDuck(570 - cameraX, city.ground - 56, 0.8, -1);
        drawLabel(610 - cameraX, city.ground - 88, "小鸭邻居");
      }

      function drawPortalShop() {
        drawInteriorBase("传送门店", "#efe8ff");
        portalDestinations.forEach((destination, index) => {
          const x = 250 + index * 220 - cameraX;
          ctx.strokeStyle = destination.color;
          ctx.lineWidth = 10;
          ctx.strokeRect(x, city.ground - 190, 92, 138);
          ctx.fillStyle = `${destination.color}55`;
          ctx.fillRect(x + 12, city.ground - 178, 68, 114);
          drawLabel(x + 46, city.ground - 210, destination.label);
        });
        drawDuck(1080 - cameraX, city.ground - 56, 0.8, -1);
      }

      function drawItemShop() {
        drawInteriorBase("道具店", "#e9f8ff");
        ctx.fillStyle = "#cf7848";
        ctx.fillRect(460 - cameraX, city.ground - 86, 330, 42);
        ctx.fillStyle = "#7ee5ff";
        ctx.beginPath();
        ctx.arc(620 - cameraX, city.ground - 120, 24, 0, Math.PI * 2);
        ctx.fill();
        drawLabel(620 - cameraX, city.ground - 154, "钻石 5金币");
        drawDuck(820 - cameraX, city.ground - 56, 0.8, -1);
      }

      function drawCraftShop() {
        drawInteriorBase("合成店", "#eef9e8");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(392 - cameraX, 150, 500, 230);
        ctx.strokeStyle = "#d8e2d8";
        ctx.strokeRect(392 - cameraX, 150, 500, 230);
        ctx.fillStyle = "#26313b";
        ctx.font = "900 22px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`钻石 ${state.materials.diamond}`, 430 - cameraX, 205);
        ctx.fillText(`绿宝石 ${state.materials.emerald}`, 430 - cameraX, 250);
        ctx.fillText(`黑曜石 ${state.materials.obsidian}`, 430 - cameraX, 295);
        ctx.fillText(`水 ${state.materials.water}`, 430 - cameraX, 340);
        drawLabel(650 - cameraX, city.ground - 132, "按上合成");
        drawDuck(900 - cameraX, city.ground - 56, 0.8, -1);
      }

      function drawUnderwaterCity() {
        const scale = viewScale();
        const w = canvas.clientWidth / scale;
        ctx.fillStyle = "#3daee9";
        ctx.fillRect(0, 0, w, world.h);
        ctx.fillStyle = "rgba(255,255,255,0.28)";
        for (let i = 0; i < 9; i += 1) ctx.fillRect(i * 190 - (cameraX % 190), 140 + (i % 6) * 70, 92, 7);
        for (let i = 0; i < 5; i += 1) {
          ctx.fillStyle = "#7dd5ff";
          ctx.fillRect(260 + i * 240 - cameraX, 430 - i * 18, 130, 160 + i * 18);
          ctx.strokeStyle = "#e6fbff";
          ctx.strokeRect(260 + i * 240 - cameraX, 430 - i * 18, 130, 160 + i * 18);
        }
        drawLabel(640 - cameraX, 132, "地下水城");
      }

      function drawWorldShop() {
        drawInteriorBase("世界商店", "#fff7d4");
        drawLabel(620 - cameraX, city.ground - 150, "按上领金币");
        ctx.fillStyle = "#f5c84c";
        for (let i = 0; i < 7; i += 1) {
          ctx.beginPath();
          ctx.arc(460 + i * 44 - cameraX, city.ground - 100, 16, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawDeathLand() {
        const scale = viewScale();
        const w = canvas.clientWidth / scale;
        ctx.fillStyle = "#27242b";
        ctx.fillRect(0, 0, w, world.h);
        ctx.fillStyle = "#4b3d4f";
        ctx.fillRect(-cameraX, city.ground, world.w, world.h - city.ground);
        ctx.fillStyle = "#d84b44";
        for (let i = 0; i < 12; i += 1) {
          ctx.beginPath();
          ctx.moveTo(i * 150 - (cameraX % 150), city.ground);
          ctx.lineTo(i * 150 + 34 - (cameraX % 150), city.ground - 58);
          ctx.lineTo(i * 150 + 68 - (cameraX % 150), city.ground);
          ctx.fill();
        }
        drawLabel(620 - cameraX, 160, "死亡之地");
      }

      function drawHelperLand() {
        const scale = viewScale();
        const w = canvas.clientWidth / scale;
        ctx.fillStyle = "#cfe8c5";
        ctx.fillRect(0, 0, w, world.h);
        ctx.fillStyle = "#6aa963";
        ctx.fillRect(-cameraX, city.ground, world.w, world.h - city.ground);
        state.helperEnemies.forEach((enemy) => {
          if (enemy.beaten) {
            drawDuck(enemy.x - cameraX, enemy.y, 0.72, -1);
            return;
          }
          ctx.fillStyle = "#48625d";
          ctx.fillRect(enemy.x - cameraX, enemy.y + 10, 44, 36);
          drawDuck(enemy.x - cameraX - 2, enemy.y - 4, 0.64, -1);
        });
        drawLabel(610 - cameraX, 140, "空格打败助手");
      }

      function drawSceneBackground() {
        if (state.scene === "earth") drawEarthBackground();
        if (state.scene === "ocean") drawOceanBackground();
        if (state.scene === "island") {
          drawOceanBackground();
        }
        if (state.scene === "mine") drawMineBackground();
        if (state.scene === "city") drawCityBackground();
        if (state.scene === "house") drawHouseInterior();
        if (state.scene === "portalShop") drawPortalShop();
        if (state.scene === "itemShop") drawItemShop();
        if (state.scene === "craftShop") drawCraftShop();
        if (state.scene === "underwaterCity") drawUnderwaterCity();
        if (state.scene === "worldShop") drawWorldShop();
        if (state.scene === "deathLand") drawDeathLand();
        if (state.scene === "helperLand") drawHelperLand();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
        ctx.save();
        ctx.scale(viewScale(), viewScale());
        drawSceneBackground();
        if (state.scene === "earth") {
          state.clouds.forEach(drawCloud);
          state.coins.forEach(drawCoin);
          drawBakery(bakery.x - cameraX, bakery.y, "面包店");
        }
        if (state.scene === "city") {
          ctx.fillStyle = "#ffffff";
          ctx.font = "900 18px sans-serif";
          ctx.fillText("每扇门都能按上进入；回车上车/下车", 780 - cameraX, 112);
        }
        if (state.scene === "earth" || state.scene === "city") state.coins.forEach(drawCoin);
        drawPlayer();
        ctx.restore();

        if (flash) {
          ctx.fillStyle = "rgba(38, 49, 59, 0.82)";
          ctx.fillRect(canvas.clientWidth / 2 - 82, 18, 164, 38);
          ctx.fillStyle = "#fffdf8";
          ctx.font = "900 18px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(flash, canvas.clientWidth / 2, 43);
        }
      }

      function loop(time) {
        if (!lastTime) lastTime = time;
        const dt = Math.min(0.032, (time - lastTime) / 1000);
        lastTime = time;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("keydown", (event) => {
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space", "Enter"].includes(event.code)) event.preventDefault();
        keys.add(event.code);
        if (event.repeat) return;
        if (event.code === "Enter") {
          startDrivingCloud();
          tryBuildPortal();
          tryUseCityThings();
        }
        if (event.code === "ArrowUp") {
          useCurrentPlace();
        }
        if (event.code === "ArrowDown") {
          if (["house", "portalShop", "itemShop", "craftShop", "worldShop", "underwaterCity", "deathLand", "helperLand"].includes(state.scene)) {
            returnToCity();
          } else {
            burrow();
          }
        }
        if (event.code === "Space" || /^Key[A-Z]$/.test(event.code)) {
          if (!attackHelper()) jump();
        }
      });
      window.addEventListener("keyup", (event) => keys.delete(event.code));
      resetButton.addEventListener("click", resetGame);

      document.querySelectorAll("[data-touch]").forEach((button) => {
        const map = { left: "ArrowLeft", right: "ArrowRight", up: "ArrowUp", down: "ArrowDown" };
        const press = () => {
          const action = button.dataset.touch;
          if (action === "jump") jump();
          else {
            keys.add(map[action]);
            if (action === "up") useCurrentPlace();
            if (action === "down") burrow();
          }
          canvas.focus();
        };
        const release = () => {
          const action = button.dataset.touch;
          if (action !== "jump") keys.delete(map[action]);
        };
        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("pointerleave", release);
      });

      resize();
      resetGame();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
