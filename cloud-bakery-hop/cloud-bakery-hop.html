<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>云朵面包店</title>
    <style>
      :root {
        color-scheme: light;
        --page: #eef7f3;
        --panel: #fffdf8;
        --ink: #26313b;
        --muted: #63717d;
        --line: #d8e2d8;
        --sky: #9ed9f0;
        --sky-deep: #68b9d7;
        --grass: #6fc071;
        --grass-dark: #45895c;
        --soil: #8d6544;
        --soil-dark: #62422c;
        --bakery: #f3a85e;
        --roof: #d84b44;
        --coin: #f5c84c;
        --coin-dark: #b9791c;
        --hero: #48a7c6;
        --hero-dark: #287990;
        --danger: #464b58;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.76), transparent 220px),
          var(--page);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .app {
        width: min(100%, 1120px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .stats {
        width: min(100%, 560px);
        display: grid;
        grid-template-columns: repeat(4, minmax(76px, 1fr));
        gap: 8px;
      }

      .stat {
        min-height: 58px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.95);
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .stat strong {
        display: block;
        margin-top: 5px;
        font-size: 22px;
        line-height: 1;
      }

      .stage-wrap {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--panel);
        box-shadow: 0 18px 42px rgba(60, 89, 73, 0.14);
      }

      canvas {
        width: 100%;
        height: min(68vh, 680px);
        min-height: 430px;
        display: block;
        background: var(--sky);
        outline: none;
        touch-action: none;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .note {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        font-weight: 700;
      }

      button {
        min-height: 42px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: #2f7f65;
        color: #fff;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .touch-pad {
        position: fixed;
        left: 14px;
        right: 14px;
        bottom: 14px;
        display: none;
        justify-content: space-between;
        pointer-events: none;
      }

      .touch-group {
        display: grid;
        grid-template-columns: repeat(3, 48px);
        grid-template-rows: repeat(2, 48px);
        gap: 8px;
        pointer-events: auto;
      }

      .touch-button {
        width: 48px;
        height: 48px;
        padding: 0;
        border-radius: 8px;
        background: rgba(38, 49, 59, 0.72);
      }

      .touch-button.up {
        grid-column: 2;
      }

      .touch-button.left {
        grid-column: 1;
        grid-row: 2;
      }

      .touch-button.down {
        grid-column: 2;
        grid-row: 2;
      }

      .touch-button.right {
        grid-column: 3;
        grid-row: 2;
      }

      .jump-touch {
        align-self: end;
        width: 92px;
        height: 92px;
        border-radius: 50%;
        background: rgba(216, 75, 68, 0.82);
        pointer-events: auto;
      }

      @media (max-width: 720px) {
        .app {
          padding: 10px 10px 118px;
        }

        .stats {
          grid-template-columns: repeat(2, minmax(92px, 1fr));
        }

        canvas {
          height: 62vh;
          min-height: 390px;
        }

        .controls {
          grid-template-columns: 1fr;
        }

        .touch-pad {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="游戏信息">
        <h1>云朵面包店</h1>
        <div class="stats" aria-live="polite">
          <div class="stat"><span>金币</span><strong id="coins">0</strong></div>
          <div class="stat"><span>云朵</span><strong id="clouds">0/7</strong></div>
          <div class="stat"><span>面包</span><strong id="bread">0</strong></div>
          <div class="stat"><span>等级</span><strong id="level">1</strong></div>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="game" tabindex="0" aria-label="云朵面包店小游戏"></canvas>
      </section>

      <section class="controls">
        <p class="note">户外：任意字母或空格跳，门口按上进店。店里：方向键移动，柜台按上用 3 金币买面包，按字母或空格吃面包升级。</p>
        <button id="reset" type="button">重新开始</button>
      </section>
    </main>

    <div class="touch-pad" aria-hidden="true">
      <div class="touch-group">
        <button class="touch-button up" data-touch="up" type="button">上</button>
        <button class="touch-button left" data-touch="left" type="button">左</button>
        <button class="touch-button down" data-touch="down" type="button">下</button>
        <button class="touch-button right" data-touch="right" type="button">右</button>
      </div>
      <button class="jump-touch" data-touch="jump" type="button">跳</button>
    </div>

    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const coinText = document.querySelector("#coins");
      const cloudText = document.querySelector("#clouds");
      const breadText = document.querySelector("#bread");
      const levelText = document.querySelector("#level");
      const resetButton = document.querySelector("#reset");

      const keys = new Set();
      const gravity = 1850;
      const coinRespawnTime = 2.8;
      const world = { w: 1680, h: 760, ground: 626 };
      const bakery = { x: 1220, y: 306, w: 360, h: 320, inside: false };

      let lastTime = 0;
      let cameraX = 0;
      let flash = "";
      let flashTime = 0;

      const startState = () => ({
        player: {
          x: 72,
          y: world.ground - 54,
          w: 42,
          h: 54,
          vx: 0,
          vy: 0,
          onGround: true,
          facing: 1,
          buried: false,
          invincible: 0,
        },
        coins: [],
        clouds: [],
        score: 0,
        bread: 0,
        level: 1,
      });

      let state = startState();

      function buildWorld() {
        state.clouds = [
          { x: 250, y: 500, w: 162, h: 34, active: true, visited: false },
          { x: 380, y: 438, w: 166, h: 34, active: true, visited: false },
          { x: 512, y: 376, w: 170, h: 34, active: true, visited: false },
          { x: 646, y: 314, w: 170, h: 34, active: true, visited: false },
          { x: 780, y: 252, w: 174, h: 34, active: true, visited: false },
          { x: 950, y: 252, w: 174, h: 34, active: true, visited: false },
          { x: 1120, y: 252, w: 170, h: 34, active: true, visited: false },
        ];

        state.coins = [
          ...makeCoinLine(150, 1040, world.ground - 42, 16, 56),
          ...makeCoinLine(280, 340, 454, 3, 34),
          ...makeCoinLine(414, 500, 392, 3, 34),
          ...makeCoinLine(548, 638, 330, 3, 34),
          ...makeCoinLine(682, 772, 268, 3, 34),
          ...makeCoinLine(822, 1094, 206, 7, 44),
          ...makeCoinLine(1160, 1248, 206, 3, 34),
          ...makeCoinLine(1292, 1532, world.ground - 44, 5, 54),
        ];
      }

      function makeCoinLine(startX, endX, y, count, step) {
        return Array.from({ length: count }, (_, index) => ({
          x: count === 1 ? startX : startX + index * step,
          y,
          r: 13,
          got: false,
          respawn: 0,
        })).filter((coin) => coin.x <= endX);
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        const ratio = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.round(rect.width * ratio);
        canvas.height = Math.round(rect.height * ratio);
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      }

      function viewScale() {
        return canvas.clientHeight / world.h;
      }

      function resetGame() {
        state = startState();
        buildWorld();
        bakery.inside = false;
        cameraX = 0;
        showFlash("开始");
        updateStats();
        canvas.focus();
      }

      function showFlash(text) {
        flash = text;
        flashTime = 1.2;
      }

      function updateStats() {
        coinText.textContent = state.score;
        cloudText.textContent = `${state.clouds.filter((cloud) => cloud.visited).length}/${state.clouds.length}`;
        breadText.textContent = state.bread;
        levelText.textContent = state.level;
      }

      function jump(power = 690) {
        const p = state.player;
        if (p.buried) return;
        if (p.onGround) {
          p.vy = -power;
          p.onGround = false;
        }
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function circleRectOverlap(circle, rect) {
        const cx = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
        const cy = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
        const dx = circle.x - cx;
        const dy = circle.y - cy;
        return dx * dx + dy * dy < circle.r * circle.r;
      }

      function enterBakeryIfNeeded() {
        const p = state.player;
        return p.x + p.w > bakery.x + 150 && p.x < bakery.x + 204 && p.y + p.h >= world.ground - 12;
      }

      function playerAtCounter() {
        const p = state.player;
        return p.x + p.w > bakery.x + 252 && p.x < bakery.x + 348;
      }

      function enterBakery() {
        const p = state.player;
        bakery.inside = true;
        p.x = bakery.x + 78;
        p.y = world.ground - p.h;
        p.vx = 0;
        p.vy = 0;
        p.onGround = true;
        p.buried = false;
        showFlash("进店");
      }

      function leaveBakery() {
        const p = state.player;
        bakery.inside = false;
        p.x = bakery.x + 152;
        p.y = world.ground - p.h;
        p.vx = 0;
        p.vy = 0;
        p.onGround = true;
        showFlash("出店");
      }

      function buyBread() {
        if (state.score < 3) {
          showFlash("要 3 金币");
          return;
        }
        state.score -= 3;
        state.bread += 1;
        showFlash("买到面包");
      }

      function eatBread() {
        if (!bakery.inside || state.bread <= 0) return;
        state.bread -= 1;
        state.level += 1;
        showFlash(`升级 ${state.level}`);
      }

      function handleInput(dt) {
        const p = state.player;
        const speed = bakery.inside ? 265 : 230;
        let move = 0;
        if (bakery.inside) {
          if (keys.has("ArrowLeft")) move -= 1;
          if (keys.has("ArrowRight")) move += 1;
          if (keys.has("ArrowDown")) leaveBakery();
        } else {
          if (keys.has("ArrowLeft") || keys.has("KeyA")) move -= 1;
          if (keys.has("ArrowRight") || keys.has("KeyD")) move += 1;
        }
        if (!p.buried) {
          p.vx = move * speed;
          if (move !== 0) p.facing = move;
        }
        p.x += p.vx * dt;
      }

      function update(dt) {
        const p = state.player;
        flashTime = Math.max(0, flashTime - dt);
        if (flashTime === 0) flash = "";
        p.invincible = Math.max(0, p.invincible - dt);
        handleInput(dt);

        p.x = Math.max(16, Math.min(world.w - p.w - 16, p.x));
        if (bakery.inside) {
          p.x = Math.max(bakery.x + 48, Math.min(bakery.x + bakery.w - p.w - 34, p.x));
          p.y = world.ground - p.h;
          p.vy = 0;
          p.onGround = true;
        } else if (p.buried) {
          p.y = world.ground - 23;
          p.vy = 0;
          p.onGround = true;
        } else {
          p.vy += gravity * dt;
          p.y += p.vy * dt;
        }

        if (p.y + p.h >= world.ground) {
          p.y = world.ground - p.h;
          p.vy = 0;
          p.onGround = true;
        }

        const playerRect = { x: p.x, y: p.y, w: p.w, h: p.buried ? 20 : p.h };
        for (const cloud of state.clouds) {
          const wasBelow = p.y >= cloud.y + cloud.h - 8;
          const bumping = p.vy < 0 && wasBelow && rectsOverlap(playerRect, cloud);
          if (bumping) {
            p.y = cloud.y + cloud.h + 2;
            p.vy = 220;
          }
          const softCloudTop = { x: cloud.x - 20, y: cloud.y, w: cloud.w + 40, h: cloud.h };
          const landing = cloud.active && p.vy >= 0 && p.y + p.h <= cloud.y + 32 && rectsOverlap(playerRect, softCloudTop);
          if (landing) {
            cloud.visited = true;
            p.y = cloud.y - p.h;
            p.vy = 0;
            p.onGround = true;
          }
        }

        const bakeryRoof = { x: bakery.x + 10, y: bakery.y + 76, w: bakery.w - 20, h: 18 };
        const onBakeryRoof = !bakery.inside && p.vy >= 0 && p.y + p.h <= bakeryRoof.y + 30 && rectsOverlap(playerRect, bakeryRoof);
        if (onBakeryRoof) {
          p.y = bakeryRoof.y - p.h;
          p.vy = 0;
          p.onGround = true;
        }

        for (const coin of state.coins) {
          if (coin.got) {
            coin.respawn -= dt;
            if (coin.respawn <= 0) {
              coin.got = false;
              coin.respawn = 0;
            }
          }
          if (!coin.got && circleRectOverlap(coin, playerRect)) {
            coin.got = true;
            coin.respawn = coinRespawnTime;
            state.score += 1;
            showFlash("金币 +1");
          }
        }

        const visibleWorldWidth = canvas.clientWidth / viewScale();
        cameraX = Math.max(0, Math.min(world.w - visibleWorldWidth, p.x - visibleWorldWidth * 0.42));
        updateStats();
      }

      function drawCloud(cloud) {
        ctx.save();
        ctx.translate(cloud.x - cameraX, cloud.y);
        ctx.fillStyle = cloud.active ? "#fffdf5" : "rgba(255, 255, 255, 0.52)";
        ctx.strokeStyle = cloud.active ? "#86b9cf" : "rgba(111, 148, 163, 0.42)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(26, 23, 27, 18, 0, 0, Math.PI * 2);
        ctx.ellipse(62, 15, 36, 23, 0, 0, Math.PI * 2);
        ctx.ellipse(100, 23, 32, 18, 0, 0, Math.PI * 2);
        ctx.rect(22, 20, cloud.w - 42, 22);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawCoin(coin) {
        if (coin.got) return;
        const x = coin.x - cameraX;
        ctx.fillStyle = "#f5c84c";
        ctx.strokeStyle = "#b9791c";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, coin.y, coin.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(255, 255, 255, 0.58)";
        ctx.fillRect(x - 3, coin.y - 9, 6, 18);
      }

      function drawBakery() {
        const x = bakery.x - cameraX;
        ctx.fillStyle = "#f3a85e";
        ctx.fillRect(x + 24, bakery.y + 58, bakery.w - 48, bakery.h - 58);
        ctx.fillStyle = "#ffe4aa";
        for (let i = 0; i < 7; i += 1) {
          ctx.fillRect(x + 36 + i * 42, bakery.y + 66, 23, 42);
        }
        ctx.fillStyle = "#d84b44";
        ctx.beginPath();
        ctx.moveTo(x, bakery.y + 78);
        ctx.lineTo(x + bakery.w / 2, bakery.y);
        ctx.lineTo(x + bakery.w, bakery.y + 78);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#6f3b2a";
        ctx.fillRect(x + 150, world.ground - 112, 72, 112);
        ctx.fillStyle = "#f8e4bd";
        ctx.fillRect(x + 42, world.ground - 206, 92, 76);
        ctx.fillRect(x + 236, world.ground - 206, 82, 76);
        ctx.fillStyle = "#75442e";
        ctx.font = "900 22px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("面包店", x + bakery.w / 2, bakery.y + 118);
        ctx.fillStyle = "#8c4f32";
        ctx.fillRect(x + 292, world.ground - 92, 54, 72);
        ctx.fillStyle = "#ffd77a";
        ctx.beginPath();
        ctx.arc(x + 319, world.ground - 54, 18, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawPlayer() {
        const p = state.player;
        const x = p.x - cameraX;
        const blink = p.invincible > 0 && Math.floor(p.invincible * 12) % 2 === 0;
        if (blink) return;
        if (p.buried) {
          ctx.fillStyle = "rgba(98, 66, 44, 0.38)";
          ctx.beginPath();
          ctx.ellipse(x + p.w / 2, world.ground - 8, 34, 13, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#287990";
          ctx.fillRect(x + 7, world.ground - 29, p.w - 14, 14);
          return;
        }
        ctx.fillStyle = "#48a7c6";
        ctx.fillRect(x + 4, p.y + 14, p.w - 8, p.h - 18);
        ctx.fillStyle = "#287990";
        ctx.fillRect(x + 9, p.y + 5, p.w - 18, 18);
        ctx.fillStyle = "#f7e0bf";
        ctx.fillRect(x + 11, p.y + 18, p.w - 22, 18);
        ctx.fillStyle = "#26313b";
        ctx.fillRect(x + (p.facing > 0 ? 26 : 13), p.y + 24, 4, 4);
        ctx.fillStyle = "#f5c84c";
        ctx.fillRect(x + 8, p.y + p.h - 7, 10, 7);
        ctx.fillRect(x + p.w - 18, p.y + p.h - 7, 10, 7);
      }

      function drawBackground() {
        const scale = viewScale();
        const w = canvas.clientWidth / scale;
        const h = world.h;
        const skyGradient = ctx.createLinearGradient(0, 0, 0, h);
        skyGradient.addColorStop(0, "#9ed9f0");
        skyGradient.addColorStop(0.62, "#dff6f1");
        skyGradient.addColorStop(1, "#ecf5df");
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, w, h);

        ctx.fillStyle = "rgba(255,255,255,0.42)";
        for (let i = 0; i < 7; i += 1) {
          const x = ((i * 270 - cameraX * 0.18) % (w + 180)) - 90;
          ctx.beginPath();
          ctx.ellipse(x, 78 + (i % 3) * 34, 44, 17, 0, 0, Math.PI * 2);
          ctx.ellipse(x + 42, 74 + (i % 3) * 34, 38, 15, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "#6fc071";
        ctx.fillRect(-cameraX, world.ground, world.w, world.h - world.ground);
        ctx.fillStyle = "#8d6544";
        ctx.fillRect(-cameraX, world.ground + 34, world.w, world.h - world.ground - 34);
        ctx.fillStyle = "rgba(98, 66, 44, 0.36)";
        for (let i = 0; i < 55; i += 1) {
          ctx.fillRect(i * 36 - (cameraX % 36), world.ground + 58 + (i % 5) * 18, 16, 5);
        }
      }

      function drawBakeryInterior() {
        const x = bakery.x - cameraX;
        ctx.fillStyle = "#fff2d1";
        ctx.fillRect(x + 24, bakery.y + 78, bakery.w - 48, bakery.h - 78);
        ctx.fillStyle = "#cf7848";
        ctx.fillRect(x + 54, world.ground - 76, bakery.w - 108, 34);
        ctx.fillStyle = "#8c4f32";
        ctx.fillRect(x + 282, world.ground - 128, 56, 86);
        ctx.fillStyle = "#f5c84c";
        for (let i = 0; i < 3; i += 1) {
          ctx.beginPath();
          ctx.arc(x + 126 + i * 36, world.ground - 98, 12, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = "#d98b4a";
        ctx.beginPath();
        ctx.ellipse(x + 310, world.ground - 112, 24, 15, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#75442e";
        ctx.font = "900 18px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("3 金币买面包", x + bakery.w / 2, bakery.y + 132);
        ctx.fillText("按空格吃面包升级", x + bakery.w / 2, bakery.y + 164);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
        ctx.save();
        ctx.scale(viewScale(), viewScale());
        drawBackground();
        state.clouds.forEach(drawCloud);
        state.coins.forEach(drawCoin);
        drawBakery();
        if (bakery.inside) drawBakeryInterior();
        drawPlayer();
        ctx.restore();

        if (flash) {
          ctx.fillStyle = "rgba(38, 49, 59, 0.82)";
          ctx.fillRect(canvas.clientWidth / 2 - 70, 18, 140, 38);
          ctx.fillStyle = "#fffdf8";
          ctx.font = "900 18px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(flash, canvas.clientWidth / 2, 43);
        }
      }

      function loop(time) {
        if (!lastTime) lastTime = time;
        const dt = Math.min(0.032, (time - lastTime) / 1000);
        lastTime = time;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("keydown", (event) => {
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(event.code)) {
          event.preventDefault();
        }
        keys.add(event.code);
        if (event.repeat) return;
        if (!bakery.inside && event.code === "ArrowUp" && enterBakeryIfNeeded()) {
          enterBakery();
        }
        if (bakery.inside && event.code === "ArrowUp" && playerAtCounter()) {
          buyBread();
        }
        if (bakery.inside && (event.code === "Space" || /^Key[A-Z]$/.test(event.code))) {
          eatBread();
        } else if (!bakery.inside && (event.code === "Space" || /^Key[A-Z]$/.test(event.code))) {
          jump();
        }
      });
      window.addEventListener("keyup", (event) => keys.delete(event.code));
      resetButton.addEventListener("click", resetGame);

      document.querySelectorAll("[data-touch]").forEach((button) => {
        const map = { left: "ArrowLeft", right: "ArrowRight", up: "ArrowUp", down: "ArrowDown" };
        const press = () => {
          const action = button.dataset.touch;
          if (action === "jump") {
            if (bakery.inside) eatBread();
            else jump();
          } else if (action === "up" && !bakery.inside && enterBakeryIfNeeded()) {
            enterBakery();
          } else if (action === "up" && bakery.inside && playerAtCounter()) {
            buyBread();
          } else {
            keys.add(map[action]);
          }
          canvas.focus();
        };
        const release = () => {
          const action = button.dataset.touch;
          if (action !== "jump") keys.delete(map[action]);
        };
        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("pointerleave", release);
      });

      resize();
      resetGame();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
