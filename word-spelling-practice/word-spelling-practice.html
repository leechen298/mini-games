<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>单词拼写</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #6d5df6;
        --primary-soft: #b8adfb;
        --primary-pale: #e5e1ff;
        --ink: #172232;
        --muted: #7d8491;
        --line: #edf0f5;
        --surface: #ffffff;
        --page: #f6f7fb;
        --yellow: #ffd449;
        --yellow-ink: #735513;
        --danger: #ee5265;
        --success: #22b573;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      .app {
        width: min(100%, 480px);
        min-height: 100vh;
        margin: 0 auto;
        background: var(--page);
        display: flex;
        flex-direction: column;
      }

      .topbar {
        height: 116px;
        padding: 28px 18px 0;
        background: var(--surface);
        display: grid;
        grid-template-columns: 48px 1fr 48px;
        align-items: center;
      }

      .back {
        width: 44px;
        height: 44px;
        background: transparent;
        color: #354151;
        font-size: 44px;
        line-height: 1;
      }

      .back[hidden] {
        display: block;
        visibility: hidden;
      }

      h1 {
        margin: 0;
        text-align: center;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .progress-wrap {
        display: none;
        align-items: center;
        gap: 20px;
        padding: 28px 18px 30px;
        background: var(--surface);
      }

      .progress-wrap.is-visible {
        display: flex;
      }

      .track {
        flex: 1;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: #f0f3f7;
      }

      .bar {
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: var(--primary);
        transition: width 180ms ease;
      }

      .count {
        width: 56px;
        font-size: 20px;
        font-weight: 800;
        color: #6b5df6;
        text-align: right;
      }

      .count span {
        color: #6d727c;
      }

      main {
        flex: 1;
        padding: 18px;
      }

      .panel,
      .card {
        border-radius: 8px;
        background: var(--surface);
      }

      .panel {
        padding: 22px;
      }

      .field-label {
        display: block;
        margin-bottom: 12px;
        font-size: 15px;
        font-weight: 700;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        outline: none;
        color: var(--ink);
        background: #fbfcff;
        line-height: 1.6;
      }

      textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(109, 93, 246, 0.12);
      }

      .hint,
      .message {
        min-height: 24px;
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .message {
        text-align: center;
        font-weight: 700;
      }

      .message.is-error {
        color: var(--danger);
      }

      .message.is-success {
        color: var(--success);
      }

      .primary-wide {
        width: 100%;
        height: 58px;
        margin-top: 20px;
        border-radius: 999px;
        background: var(--primary);
        color: white;
        font-size: 18px;
        font-weight: 800;
      }

      .practice {
        display: none;
      }

      .practice.is-visible {
        display: block;
      }

      .card {
        min-height: 330px;
        padding: 42px 20px 34px;
      }

      .sound {
        width: 58px;
        height: 58px;
        margin: 0 auto 82px;
        border-radius: 50%;
        background: rgba(109, 93, 246, 0.1);
        color: var(--primary);
        display: grid;
        place-items: center;
      }

      .sound svg {
        width: 34px;
        height: 34px;
        fill: currentColor;
      }

      .answer {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 58px;
        margin-bottom: 26px;
      }

      .slot {
        width: clamp(34px, 10vw, 52px);
        height: 58px;
        border-bottom: 7px solid var(--primary-pale);
        color: var(--primary);
        display: grid;
        place-items: center;
        font-size: 34px;
        font-weight: 900;
        text-transform: lowercase;
      }

      .slot.is-filled {
        border-bottom-color: transparent;
      }

      .slot.is-space {
        width: clamp(52px, 15vw, 66px);
        font-size: 16px;
        font-weight: 800;
        text-transform: none;
      }

      .slot.is-mark {
        font-size: 30px;
        text-transform: none;
      }

      .letters {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .letter {
        width: clamp(52px, 15vw, 66px);
        aspect-ratio: 1;
        border-radius: 8px;
        background: var(--primary);
        color: white;
        display: grid;
        place-items: center;
        font-size: 34px;
        font-weight: 900;
        text-transform: lowercase;
        transition:
          opacity 140ms ease,
          transform 140ms ease,
          background 140ms ease;
      }

      .letter.is-space {
        width: clamp(62px, 18vw, 78px);
        font-size: 17px;
        text-transform: none;
      }

      .letter.is-mark {
        font-size: 30px;
        text-transform: none;
      }

      .letter:active {
        transform: scale(0.96);
      }

      .letter.is-used {
        background: #d8d2ff;
        opacity: 0.72;
      }

      .actions {
        display: none;
        gap: 16px;
        padding: 18px;
        background: var(--surface);
      }

      .actions.is-visible {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .action {
        height: 58px;
        border-radius: 999px;
        font-size: 18px;
        font-weight: 900;
      }

      .reset {
        background: var(--yellow);
        color: var(--yellow-ink);
      }

      .confirm {
        background: var(--primary);
        color: white;
      }

      .confirm:disabled {
        background: var(--primary-soft);
      }

      .summary {
        display: none;
        text-align: center;
      }

      .summary.is-visible {
        display: block;
      }

      .summary h2 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      .summary p {
        margin: 0;
        color: var(--muted);
      }

      @media (min-width: 481px) {
        body {
          padding: 24px 0;
        }

        .app {
          min-height: calc(100vh - 48px);
          border-radius: 18px;
          overflow: hidden;
          box-shadow: 0 20px 70px rgba(25, 34, 54, 0.14);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <button class="back" id="backBtn" type="button" aria-label="返回" hidden>‹</button>
        <h1>单词拼写</h1>
      </header>

      <section class="progress-wrap" id="progressWrap" aria-label="练习进度">
        <div class="track"><div class="bar" id="progressBar"></div></div>
        <div class="count"><strong id="currentCount">0</strong><span id="totalCount">/0</span></div>
      </section>

      <main>
        <section class="panel" id="setupView">
          <label class="field-label" for="wordInput">英语单词</label>
          <textarea id="wordInput" spellcheck="false" placeholder="tick-tock&#10;o'clock&#10;grow up"></textarea>
          <p class="hint" id="setupMessage">每行一个单词或短语，空格、-、' 会保留。</p>
          <button class="primary-wide" id="startBtn" type="button">生成练习</button>
        </section>

        <section class="practice" id="practiceView">
          <div class="card">
            <button class="sound" id="soundBtn" type="button" aria-label="播放单词发音">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 9.25C3 8.56 3.56 8 4.25 8h3.17l4.4-3.67A1.2 1.2 0 0 1 13.8 5.25v13.5a1.2 1.2 0 0 1-1.98.92L7.42 16H4.25C3.56 16 3 15.44 3 14.75v-5.5Zm13.3-.75a1 1 0 0 1 1.4.2 5.5 5.5 0 0 1 0 6.6 1 1 0 1 1-1.6-1.2 3.5 3.5 0 0 0 0-4.2 1 1 0 0 1 .2-1.4Zm3.1-2.35a1 1 0 0 1 1.4.2 9.5 9.5 0 0 1 0 11.3 1 1 0 0 1-1.6-1.2 7.5 7.5 0 0 0 0-8.9 1 1 0 0 1 .2-1.4Z"
                />
              </svg>
            </button>
            <div class="answer" id="answerSlots" aria-label="已选择字母"></div>
            <div class="letters" id="letterChoices" aria-label="候选字母"></div>
            <p class="message" id="practiceMessage"></p>
          </div>
        </section>

        <section class="panel summary" id="summaryView">
          <h2>练习完成</h2>
          <p id="summaryText"></p>
          <button class="primary-wide" id="restartBtn" type="button">重新开始</button>
        </section>
      </main>

      <footer class="actions" id="actionsBar">
        <button class="action reset" id="resetBtn" type="button">重置</button>
        <button class="action confirm" id="confirmBtn" type="button" disabled>确定</button>
      </footer>
    </div>

    <script id="spelling-core">
      window.SpellingPracticeCore = (() => {
        function parseWords(input) {
          return input
            .split(/\r?\n/)
            .map((word) =>
              word
                .trim()
                .toLowerCase()
                .replace(/[’‘＇]/g, "'")
                .replace(/[‐‑‒–—―]/g, "-")
                .replace(/\s+/g, " "),
            )
            .filter((word) => /[a-z]/.test(word));
        }

        function shuffleWord(word, random = Math.random) {
          const original = [...word.toLowerCase()];
          if (original.length < 2 || new Set(original).size < 2) {
            return original;
          }

          for (let attempt = 0; attempt < 30; attempt += 1) {
            const letters = [...original];
            for (let i = letters.length - 1; i > 0; i -= 1) {
              const j = Math.floor(random() * (i + 1));
              [letters[i], letters[j]] = [letters[j], letters[i]];
            }
            if (letters.join("") !== word.toLowerCase()) {
              return letters;
            }
          }

          const fallback = [...original];
          for (let i = 0; i < fallback.length - 1; i += 1) {
            for (let j = i + 1; j < fallback.length; j += 1) {
              if (fallback[i] !== fallback[j]) {
                [fallback[i], fallback[j]] = [fallback[j], fallback[i]];
                return fallback;
              }
            }
          }
          return fallback;
        }

        return { parseWords, shuffleWord };
      })();
    </script>

    <script>
      const { parseWords, shuffleWord } = window.SpellingPracticeCore;

      const setupView = document.querySelector("#setupView");
      const practiceView = document.querySelector("#practiceView");
      const summaryView = document.querySelector("#summaryView");
      const progressWrap = document.querySelector("#progressWrap");
      const actionsBar = document.querySelector("#actionsBar");
      const backBtn = document.querySelector("#backBtn");
      const startBtn = document.querySelector("#startBtn");
      const restartBtn = document.querySelector("#restartBtn");
      const resetBtn = document.querySelector("#resetBtn");
      const confirmBtn = document.querySelector("#confirmBtn");
      const soundBtn = document.querySelector("#soundBtn");
      const wordInput = document.querySelector("#wordInput");
      const setupMessage = document.querySelector("#setupMessage");
      const practiceMessage = document.querySelector("#practiceMessage");
      const answerSlots = document.querySelector("#answerSlots");
      const letterChoices = document.querySelector("#letterChoices");
      const progressBar = document.querySelector("#progressBar");
      const currentCount = document.querySelector("#currentCount");
      const totalCount = document.querySelector("#totalCount");
      const summaryText = document.querySelector("#summaryText");

      const state = {
        view: "setup",
        words: [],
        index: 0,
        letters: [],
        selectedTileIds: [],
      };

      function setView(view) {
        state.view = view;
        setupView.hidden = view !== "setup";
        practiceView.classList.toggle("is-visible", view === "practice");
        summaryView.classList.toggle("is-visible", view === "summary");
        progressWrap.classList.toggle("is-visible", view === "practice");
        actionsBar.classList.toggle("is-visible", view === "practice");
        backBtn.hidden = view === "setup";
      }

      function currentWord() {
        return state.words[state.index] || "";
      }

      function selectedAnswer() {
        return state.selectedTileIds.map((tileId) => state.letters[tileId]).join("");
      }

      function visibleCharacter(character) {
        return character === " " ? "空格" : character;
      }

      function characterLabel(character) {
        if (character === " ") {
          return "空格";
        }
        if (character === "-") {
          return "连字符 -";
        }
        if (character === "'") {
          return "撇号 '";
        }
        return `字母 ${character}`;
      }

      function applyCharacterClass(element, character) {
        if (character === " ") {
          element.classList.add("is-space");
        }
        if (character === "-" || character === "'") {
          element.classList.add("is-mark");
        }
      }

      function unusedTileIdFor(letter) {
        const target = letter.toLowerCase();
        return state.letters.findIndex((choice, tileId) => {
          return choice === target && !state.selectedTileIds.includes(tileId);
        });
      }

      function updateProgress() {
        const total = state.words.length;
        const current = Math.min(state.index + 1, total);
        currentCount.textContent = String(current);
        totalCount.textContent = `/${total}`;
        progressBar.style.width = `${total ? (current / total) * 100 : 0}%`;
      }

      function renderSlots() {
        const word = currentWord();
        answerSlots.innerHTML = "";
        for (let i = 0; i < word.length; i += 1) {
          const slot = document.createElement("button");
          slot.className = "slot";
          slot.type = "button";
          slot.setAttribute("aria-label", `第 ${i + 1} 个字符`);
          const tileId = state.selectedTileIds[i];
          if (tileId !== undefined) {
            const character = state.letters[tileId];
            slot.textContent = visibleCharacter(character);
            applyCharacterClass(slot, character);
            slot.classList.add("is-filled");
            slot.addEventListener("click", () => removeLetter(i));
          }
          answerSlots.append(slot);
        }
      }

      function renderChoices() {
        letterChoices.innerHTML = "";
        state.letters.forEach((letter, tileId) => {
          const button = document.createElement("button");
          button.className = "letter";
          button.type = "button";
          button.textContent = visibleCharacter(letter);
          applyCharacterClass(button, letter);
          button.setAttribute("aria-label", `选择${characterLabel(letter)}`);
          if (state.selectedTileIds.includes(tileId)) {
            button.classList.add("is-used");
            button.disabled = true;
          } else {
            button.addEventListener("click", () => chooseLetter(tileId));
          }
          letterChoices.append(button);
        });
      }

      function renderQuestion() {
        state.letters = shuffleWord(currentWord());
        state.selectedTileIds = [];
        practiceMessage.textContent = "";
        practiceMessage.className = "message";
        confirmBtn.disabled = true;
        updateProgress();
        renderSlots();
        renderChoices();
      }

      function chooseLetter(tileId) {
        if (state.selectedTileIds.length >= currentWord().length) {
          return;
        }
        state.selectedTileIds.push(tileId);
        practiceMessage.textContent = "";
        practiceMessage.className = "message";
        confirmBtn.disabled = state.selectedTileIds.length !== currentWord().length;
        renderSlots();
        renderChoices();
      }

      function removeLetter(slotIndex) {
        state.selectedTileIds.splice(slotIndex, 1);
        confirmBtn.disabled = true;
        renderSlots();
        renderChoices();
      }

      function removeLastLetter() {
        if (state.selectedTileIds.length === 0) {
          return;
        }
        removeLetter(state.selectedTileIds.length - 1);
      }

      function resetCurrent() {
        state.selectedTileIds = [];
        practiceMessage.textContent = "";
        practiceMessage.className = "message";
        confirmBtn.disabled = true;
        renderSlots();
        renderChoices();
      }

      function confirmCurrent() {
        if (selectedAnswer() !== currentWord()) {
          practiceMessage.textContent = "拼写不对，再试一次";
          practiceMessage.className = "message is-error";
          return;
        }

        practiceMessage.textContent = "拼写正确";
        practiceMessage.className = "message is-success";
        confirmBtn.disabled = true;

        window.setTimeout(() => {
          state.index += 1;
          if (state.index >= state.words.length) {
            finishPractice();
          } else {
            renderQuestion();
          }
        }, 450);
      }

      function startPractice() {
        const words = parseWords(wordInput.value);
        if (words.length === 0) {
          setupMessage.textContent = "请先输入至少一个英语单词。";
          setupMessage.style.color = "var(--danger)";
          return;
        }

        state.words = words;
        state.index = 0;
        setupMessage.textContent = "每行一个单词或短语，空格、-、' 会保留。";
        setupMessage.style.color = "var(--muted)";
        setView("practice");
        renderQuestion();
        speakCurrentWord();
      }

      function finishPractice() {
        summaryText.textContent = `本次共完成 ${state.words.length} 个单词。`;
        setView("summary");
      }

      function restart() {
        setView("setup");
        wordInput.focus();
      }

      function speakCurrentWord() {
        if (!("speechSynthesis" in window) || !currentWord()) {
          return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(currentWord());
        utterance.lang = "en-US";
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
      }

      function keyboardCharacter(event) {
        if (event.code === "Space") {
          return " ";
        }
        if (event.key === "-" || event.key === "'") {
          return event.key;
        }
        if (/^[a-zA-Z]$/.test(event.key)) {
          return event.key.toLowerCase();
        }
        return "";
      }

      function handlePracticeKeydown(event) {
        if (state.view !== "practice" || event.metaKey || event.ctrlKey || event.altKey || event.isComposing) {
          return;
        }

        if (event.key === "Backspace" || event.key === "Delete") {
          event.preventDefault();
          removeLastLetter();
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          if (!confirmBtn.disabled) {
            confirmCurrent();
          }
          return;
        }

        const character = keyboardCharacter(event);
        if (!character) {
          return;
        }

        const tileId = unusedTileIdFor(character);
        if (tileId === -1) {
          return;
        }

        event.preventDefault();
        chooseLetter(tileId);
      }

      startBtn.addEventListener("click", startPractice);
      restartBtn.addEventListener("click", restart);
      backBtn.addEventListener("click", restart);
      resetBtn.addEventListener("click", resetCurrent);
      confirmBtn.addEventListener("click", confirmCurrent);
      soundBtn.addEventListener("click", speakCurrentWord);
      document.addEventListener("keydown", handlePracticeKeydown);
      wordInput.addEventListener("input", () => {
        setupMessage.textContent = "每行一个单词或短语，空格、-、' 会保留。";
        setupMessage.style.color = "var(--muted)";
      });

      setView("setup");
    </script>
  </body>
</html>
